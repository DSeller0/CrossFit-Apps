name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: cone/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: cone

      - name: Build Cone app and public pages
        run: npm run build:all
        working-directory: cone

      - name: Assemble deploy folder
        run: |
          mkdir -p deploy/cone
          # Public pages build (HTML + fingerprinted assets)
          cp -r public-dist/. deploy/
          # React app build
          cp -r cone/dist/. deploy/cone/
          # Static files not processed by Vite
          # cone-client.js and cone-utils.js are classic scripts — Vite skips them
          cp cone-client.js cone-utils.js config.json manifest.json sw.js deploy/
          cp icon-192.png icon-512.png deploy/
          cp -f icon-192.jpeg icon-512.jpeg deploy/ 2>/dev/null || true

      - name: Deploy to gh-pages branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: deploy
          branch: gh-pages
          clean: true
