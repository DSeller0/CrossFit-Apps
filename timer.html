<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Timer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Raleway:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
:root{
  --bg:#0d0b09;--stone:#161210;--stone2:#1e1a16;--div:#2a231c;
  --gold:#d8a840;--gold2:#b88820;--teal:#4ac8c0;--green:#18cc30;
  --cream:#f0e8d0;--sub:#c8b090;--muted:#806850;--dim:#554a3a;--red:#c83030;
  --font:'Raleway',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--cream);font-family:var(--font)}
#root{height:100dvh;height:100%;display:flex;flex-direction:column;overflow:hidden}
/* desktop center column */
@media(min-width:600px){
  body{display:flex;justify-content:center}
  #root{max-width:520px;width:100%;border-left:1px solid var(--div);border-right:1px solid var(--div)}
}

/* ── Header ── */
.t-hdr{display:flex;align-items:center;gap:10px;padding:10px 16px;border-bottom:1px solid var(--div);flex-shrink:0}
.t-back{background:none;border:none;color:var(--sub);font-size:20px;cursor:pointer;padding:4px 10px 4px 0;-webkit-tap-highlight-color:transparent;line-height:1}
.t-hdr-mid{flex:1;min-width:0}
.t-type{font-size:9px;font-weight:700;letter-spacing:.1em;color:var(--muted);text-transform:uppercase}
.t-label{font-size:13px;font-weight:800;color:var(--cream);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.t-cap{font-size:10px;color:var(--muted);font-weight:700;white-space:nowrap;flex-shrink:0}

/* ── Running body ── */
.t-body{flex:1;min-height:0;display:flex;flex-direction:column;overflow:hidden}

/* ── Stamina ring ── */
.t-ring-area{flex-shrink:0;display:flex;justify-content:center;padding:10px 16px 4px}
.t-ring-wrap{
  position:relative;
  width:min(196px,54vw,40vh);
  height:min(196px,54vw,40vh);
}
.t-ring-svg{
  position:absolute;inset:0;width:100%;height:100%;
  transform:rotate(-90deg);
  overflow:visible;
}
.t-ring-track{fill:none;stroke:var(--stone2);stroke-width:11}
.t-ring-fill{
  fill:none;stroke-width:11;stroke-linecap:round;
  transition:stroke-dashoffset .35s linear,stroke .4s ease;
}
.t-ring-inner{
  position:absolute;inset:0;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:1px;
}
.t-clock{
  font-size:clamp(36px,12vw,58px);font-weight:900;
  letter-spacing:-.02em;line-height:1;
  color:var(--cream);font-variant-numeric:tabular-nums;transition:color .3s;
}
.t-clock.warn{color:var(--gold)}
.t-clock.paused{color:var(--dim)}
.t-clock-lbl{font-size:8px;color:var(--muted);font-weight:700;letter-spacing:.1em;text-transform:uppercase;margin-top:2px}
.t-round{font-size:10px;font-weight:700;color:var(--sub);letter-spacing:.06em;text-align:center;padding:0 6px}

/* ── Scrollable area (splits + exercises) ── */
.t-scroll{flex:1;min-height:0;overflow-y:auto;padding:4px 16px 4px}
.t-splits{display:flex;flex-wrap:wrap;gap:2px 10px;padding:4px 0 6px;border-bottom:1px solid var(--div);margin-bottom:4px}
.t-split-item{font-size:10px;font-weight:700;color:var(--sub)}
.t-split-item b{color:var(--dim);font-weight:400}
.t-ex{padding:6px 6px;font-size:13px;color:var(--sub);font-weight:600;border-bottom:1px solid rgba(42,35,28,.35);display:flex;align-items:flex-start;gap:10px;border-radius:4px;margin:0 -6px}
.t-ex:last-child{border-bottom:none}
.t-ex.active{color:var(--cream);font-weight:800;background:rgba(74,200,192,.06)}
.t-ex.done-s{color:var(--dim)}
.t-ex-dot{width:6px;height:6px;border-radius:50%;background:var(--div);flex-shrink:0;margin-top:5px}
.t-ex.active .t-ex-dot{background:var(--teal)}
.t-ex-body{flex:1;min-width:0}
.t-sub-ex{font-size:11px;color:var(--muted);font-weight:500;margin-top:3px;padding-left:1px;line-height:1.4}
.t-ex.active .t-sub-ex{color:var(--sub)}

/* ── Controls ── */
.t-ctrl{flex-shrink:0;display:flex;gap:8px;padding:10px 16px;padding-bottom:calc(10px + env(safe-area-inset-bottom,0px));border-top:1px solid var(--div)}
.t-btn{flex:1;padding:16px 8px;border:none;border-radius:4px;font-family:var(--font);font-size:13px;font-weight:800;cursor:pointer;letter-spacing:.04em;-webkit-tap-highlight-color:transparent;transition:opacity .12s;line-height:1}
.t-btn:active{opacity:.65}
.t-btn-lap{background:var(--stone2);border:1px solid var(--div);color:var(--sub);flex:.55}
.t-btn-pause{background:var(--stone2);border:1px solid var(--div);color:var(--cream);font-size:16px}
.t-btn-done{background:var(--stone2);border:1px solid var(--teal);color:var(--teal);flex:.55}
.t-btn-start{background:var(--teal);color:#000;font-size:15px}
.t-btn-resume{background:var(--gold);color:#000;font-size:15px}
.t-btn-reg{background:var(--gold);color:#000;flex:2;font-size:14px}
.t-btn-disc{background:transparent;border:1px solid var(--div);color:var(--muted)}
.t-btn-close{background:var(--stone2);border:1px solid var(--div);color:var(--sub)}

/* ── Ready screen ── */
.t-ready-body{flex:1;min-height:0;overflow-y:auto;padding:14px 16px;display:flex;flex-direction:column;gap:12px}
.t-badge{display:inline-block;padding:3px 10px;font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;border:1px solid var(--teal);color:var(--teal)}
.t-r-label{font-size:20px;font-weight:900;color:var(--cream);line-height:1.2;margin-top:6px}
.t-r-meta{font-size:11px;color:var(--muted);margin-top:3px}
.t-r-exlist{display:flex;flex-direction:column}
.t-r-ex{padding:7px 0;font-size:13px;color:var(--sub);font-weight:600;border-bottom:1px solid rgba(42,35,28,.4);display:flex;align-items:flex-start;gap:10px}
.t-r-ex:last-child{border-bottom:none}
.t-r-dot{width:6px;height:6px;border-radius:50%;background:var(--teal);flex-shrink:0;margin-top:4px}
.t-r-ex-body{flex:1;min-width:0}
.t-r-sub-ex{font-size:11px;color:var(--muted);font-weight:500;margin-top:3px;padding-left:1px;line-height:1.4}

/* ── Finished screen ── */
.t-fin-body{flex:1;min-height:0;overflow-y:auto;padding:16px;display:flex;flex-direction:column;align-items:center;gap:4px}
.t-fin-ttl{font-size:9px;font-weight:700;letter-spacing:.12em;color:var(--muted);text-transform:uppercase}
.t-fin-time{font-size:68px;font-weight:900;color:var(--teal);line-height:1;font-variant-numeric:tabular-nums;margin-top:2px}
.t-fin-rounds{font-size:12px;color:var(--sub);font-weight:700;margin-top:4px}
.t-fin-split-ttl{font-size:9px;font-weight:700;letter-spacing:.1em;color:var(--dim);text-transform:uppercase;align-self:flex-start;margin-top:14px;margin-bottom:5px}
.t-fin-split-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(66px,1fr));gap:5px;width:100%}
.t-fin-split-cell{background:var(--stone);padding:6px 8px;text-align:center}
.t-fin-split-n{font-size:8px;color:var(--muted);font-weight:700}
.t-fin-split-v{font-size:13px;color:var(--cream);font-weight:800}

/* ── Recentes ── */
.t-recentes{display:flex;flex-direction:column;gap:5px;width:100%}
.t-rec-ttl{font-size:8px;font-weight:700;letter-spacing:.1em;color:var(--dim);text-transform:uppercase;margin-bottom:2px}
.t-rec-item{background:var(--stone);border:1px solid var(--div);padding:9px 12px;display:flex;align-items:center;gap:10px}
.t-rec-info{flex:1;min-width:0}
.t-rec-name{font-size:10px;font-weight:700;color:var(--sub);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.t-rec-t{font-size:18px;font-weight:900;color:var(--cream)}
.t-rec-date{font-size:9px;color:var(--muted)}
.t-rec-btn{padding:5px 10px;background:transparent;border:1px solid var(--gold2);color:var(--gold);font-family:var(--font);font-size:9px;font-weight:700;cursor:pointer;-webkit-tap-highlight-color:transparent;flex-shrink:0;letter-spacing:.06em}

/* ── Config form ── */
.t-cfg{flex:1;min-height:0;overflow-y:auto;padding:14px 16px;display:flex;flex-direction:column;gap:10px}
.t-cfg-lbl{font-size:9px;font-weight:700;letter-spacing:.1em;color:var(--muted);text-transform:uppercase;margin-bottom:3px}
.t-cfg-row{display:flex;gap:8px}
.t-cfg-sel,.t-cfg-inp,.t-cfg-ta{background:var(--stone2);border:1px solid var(--div);color:var(--cream);font-family:var(--font);font-size:13px;padding:9px 10px;outline:none;width:100%;-webkit-appearance:none}
.t-cfg-sel:focus,.t-cfg-inp:focus,.t-cfg-ta:focus{border-color:var(--teal)}
.t-cfg-ta{resize:none;height:80px;font-size:12px}
.t-cfg-half{flex:1}
.t-est-opts{display:flex;gap:8px}

@media(min-width:600px){
  .t-ring-wrap{width:min(268px,52%,44vh);height:min(268px,52%,44vh)}
  .t-clock{font-size:clamp(48px,11vw,72px)}
  .t-clock-lbl{font-size:9px}
  .t-round{font-size:13px;padding:0 8px}
  .t-btn{padding:20px 10px;font-size:15px}
  .t-r-label{font-size:24px}
  .t-r-ex{font-size:14px}
  .t-r-sub-ex{font-size:12px}
  .t-fin-time{font-size:84px}
  .t-ex{font-size:14px;padding:8px 6px}
  .t-sub-ex{font-size:12px}
  .t-scroll{padding:6px 20px 6px}
  .t-ctrl{padding:12px 20px;padding-bottom:calc(12px + env(safe-area-inset-bottom,0px))}
  .t-hdr{padding:12px 20px 10px}
  .t-ready-body{padding:18px 20px}
  .t-cfg{padding:18px 20px}
  .t-fin-body{padding:20px}
  .t-ring-area{padding:14px 20px 6px}
}
</style>
</head>
<body>
<div id="root"></div>
<script>
// ── Constants ──────────────────────────────────────────────
const DAY_PT=['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
const MON_PT=['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
const MODE_LBL={'For Time':'FOR TIME','AMRAP':'AMRAP','EMOM':'EMOM','Benchmark':'BENCHMARK','Estações':'ESTAÇÕES'};
const K_CFG='timer_config', K_STATE='timer_state', K_HIST='timer_history';
const RING_R=85, RING_C=+(2*Math.PI*RING_R).toFixed(1); // ≈ 534

// ── State ──────────────────────────────────────────────────
let cfg=null;
let status='ready';
let startEpoch=0, pausedMs=0, pauseStart=0, finalSecs=0;
let splits=[];
let tickId=null, wakeLock=null;
let lastEmomMin=-1, lastStKey=null;

// ── Utils ──────────────────────────────────────────────────
function fmt(s){s=Math.max(0,Math.floor(s));return`${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`}
function fmtDate(iso){const d=new Date(iso+'T12:00:00');return`${DAY_PT[d.getDay()]} ${d.getDate()} ${MON_PT[d.getMonth()]}`}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function exLabel(ex){
  if(typeof ex==='string')return ex;
  const v=[];
  if(ex.sets&&ex.sets>1)v.push(ex.sets+'x');
  if(ex.reps)v.push(ex.reps+' reps');
  if(ex.load)v.push(ex.load+(ex.unit||'kg'));
  return[ex.name||'',v.join(' ')].filter(Boolean).join(' · ');
}
function capSecs(){return(cfg?.timeCap||0)*60}
function hasSession(){return!!(cfg?.sessionId)}
function elapsed(){
  if(status==='ready'||status==='cfg')return 0;
  if(status==='finished')return finalSecs;
  const now=status==='paused'?pauseStart:Date.now();
  return Math.max(0,(now-startEpoch-pausedMs)/1000);
}

// ── Ring math ───────────────────────────────────────────────
function ringProgress(){
  const e=elapsed(), cap=capSecs(), bt=cfg?.blockType;
  if(bt==='AMRAP')return cap?Math.max(0,(cap-e)/cap):1;
  if(bt==='EMOM')return Math.max(0,(60-(e%60))/60);
  if(bt==='Estações'){
    const{pos,st,tt}=stCycle(), phase=stPhase();
    const phaseLen=phase==='work'?st:tt;
    const phasePos=phase==='work'?pos:pos-st;
    return Math.max(0,(phaseLen-phasePos)/phaseLen);
  }
  // For Time / Benchmark: fill from empty
  return cap?Math.min(1,e/cap):Math.min(1,e/1800);
}
function ringColor(){
  // For countdown modes, progress IS the remaining fraction
  // For count-up modes, compute remaining from cap
  const e=elapsed(), cap=capSecs(), bt=cfg?.blockType;
  const isCountdown=bt==='AMRAP'||bt==='EMOM'||bt==='Estações';
  const rem=isCountdown?ringProgress():(cap?(cap-e)/cap:1);
  if(rem>0.5)return'var(--green)';
  if(rem>0.2)return'var(--gold)';
  return'var(--red)';
}
function ringOffset(){
  return+(RING_C*(1-ringProgress())).toFixed(1);
}

// ── Ring SVG ────────────────────────────────────────────────
function renderRing(clockHtml){
  const isPaused=status==='paused';
  const color=isPaused?'var(--dim)':ringColor();
  const offset=ringOffset();
  return`<div class="t-ring-area">
    <div class="t-ring-wrap">
      <svg class="t-ring-svg" viewBox="0 0 200 200" aria-hidden="true">
        <circle class="t-ring-track" cx="100" cy="100" r="${RING_R}"/>
        <circle class="t-ring-fill" cx="100" cy="100" r="${RING_R}"
          style="stroke-dasharray:${RING_C};stroke-dashoffset:${offset};stroke:${color}"/>
      </svg>
      <div class="t-ring-inner">${clockHtml}</div>
    </div>
  </div>`;
}

// ── Wake Lock ──────────────────────────────────────────────
async function acquireWL(){
  if(!('wakeLock' in navigator))return;
  try{wakeLock=await navigator.wakeLock.request('screen');}catch(e){}
}
document.addEventListener('visibilitychange',()=>{
  if(document.visibilityState==='visible'&&status==='running')acquireWL();
});

// ── Persist ────────────────────────────────────────────────
function saveState(){
  try{localStorage.setItem(K_STATE,JSON.stringify({cfg,status,startEpoch,pausedMs,pauseStart,splits,finalSecs}));}catch(e){}
}

// ── History ────────────────────────────────────────────────
function loadHist(){try{return JSON.parse(localStorage.getItem(K_HIST)||'[]');}catch(e){return[];}}
function pushHist(entry){
  const h=[entry,...loadHist()].slice(0,3);
  try{localStorage.setItem(K_HIST,JSON.stringify(h));}catch(e){}
}
function dropHist(i){
  const h=loadHist();h.splice(i,1);
  try{localStorage.setItem(K_HIST,JSON.stringify(h));}catch(e){}
}

// ── Timer math ─────────────────────────────────────────────
function getDisplay(){
  const e=elapsed(), bt=cfg.blockType;
  if(bt==='AMRAP')return Math.max(0,capSecs()-e);
  if(bt==='EMOM')return Math.max(0,60-(e%60));
  if(bt==='Estações'){
    const{pos,st,tt}=stCycle();
    return pos<st?Math.max(0,st-pos):Math.max(0,st+tt-pos);
  }
  return e;
}
function stCycle(){
  const st=cfg.stationTime||45, tt=cfg.transitionTime||15;
  const cycle=st+tt, e=elapsed();
  return{st,tt,cycle,pos:e%cycle,totalCycles:Math.floor(e/cycle)};
}
function stInfo(){
  const{st,totalCycles}=stCycle();
  const exes=cfg.exercises||[];
  return{idx:exes.length?totalCycles%exes.length:0, round:exes.length?Math.floor(totalCycles/exes.length):0};
}
function stPhase(){const{pos,st}=stCycle();return pos<st?'work':'rest';}
function isTimeUp(){
  const e=elapsed(), cap=capSecs(), bt=cfg.blockType;
  if(bt==='Estações'){
    const exes=cfg.exercises||[], r=cfg.rounds||1;
    const{st,tt}=stCycle();
    return e>=(exes.length*r*(st+tt));
  }
  if(!cap)return false;
  if(bt==='AMRAP'||bt==='EMOM'||bt==='For Time'||bt==='Benchmark')return e>=cap;
  return false;
}

// ── Render ─────────────────────────────────────────────────
function render(){
  const root=document.getElementById('root');
  if(!root)return;
  if(status==='cfg'){root.innerHTML=renderCfg();return;}
  if(status==='ready'){root.innerHTML=renderReady();return;}
  if(status==='finished'){root.innerHTML=renderFinished();return;}
  root.innerHTML=renderRunning();
}

function renderHdr(showCap=true){
  const bt=cfg.blockType, capStr=cfg.timeCap?`${cfg.timeCap}:00`:'';
  return`<div class="t-hdr">
    <button class="t-back ti ti-arrow-left" onclick="goBack()"></button>
    <div class="t-hdr-mid">
      <div class="t-type">${esc(MODE_LBL[bt]||bt)}</div>
      <div class="t-label">${esc(cfg.blockLabel||'Timer')}</div>
    </div>
    ${showCap&&capStr?`<div class="t-cap">CAP ${esc(capStr)}</div>`:''}
  </div>`;
}

// ── Config screen ───────────────────────────────────────────
function renderCfg(){
  return`<div class="t-hdr">
    <button class="t-back ti ti-arrow-left" onclick="goBack()"></button>
    <div class="t-hdr-mid"><div class="t-label">Configurar Timer</div></div>
  </div>
  <div class="t-cfg">
    <div>
      <div class="t-cfg-lbl">Tipo de WOD</div>
      <select class="t-cfg-sel" id="cfg-type" onchange="onCfgType()">
        <option>For Time</option><option>AMRAP</option><option>EMOM</option>
        <option>Benchmark</option><option>Estações</option>
      </select>
    </div>
    <div class="t-cfg-row">
      <div class="t-cfg-half">
        <div class="t-cfg-lbl">Duração (min)</div>
        <input class="t-cfg-inp" id="cfg-cap" type="number" min="1" max="90" value="20">
      </div>
      <div class="t-cfg-half" id="cfg-rounds-wrap">
        <div class="t-cfg-lbl">Rondas</div>
        <input class="t-cfg-inp" id="cfg-rounds" type="number" min="1" max="50" placeholder="—">
      </div>
    </div>
    <div id="cfg-est-wrap" style="display:none">
      <div class="t-cfg-lbl">Estações</div>
      <div class="t-est-opts">
        <div class="t-cfg-half">
          <input class="t-cfg-inp" id="cfg-st" type="number" value="45">
          <div class="t-cfg-lbl" style="margin-top:3px">Trabalho (seg)</div>
        </div>
        <div class="t-cfg-half">
          <input class="t-cfg-inp" id="cfg-tt" type="number" value="15">
          <div class="t-cfg-lbl" style="margin-top:3px">Transição (seg)</div>
        </div>
      </div>
    </div>
    <div>
      <div class="t-cfg-lbl">Nome (opcional)</div>
      <input class="t-cfg-inp" id="cfg-label" type="text" placeholder="ex: Cindy, Murph...">
    </div>
    <div>
      <div class="t-cfg-lbl">Exercícios (um por linha)</div>
      <textarea class="t-cfg-ta" id="cfg-exes" placeholder="21 Pull-ups&#10;21 KB Swings 24kg&#10;400m Run"></textarea>
    </div>
    ${renderRecentes(false)}
  </div>
  <div class="t-ctrl">
    <button class="t-btn t-btn-start" onclick="applyCfg()">▶ INICIAR</button>
  </div>`;
}

function onCfgType(){
  const t=document.getElementById('cfg-type')?.value;
  document.getElementById('cfg-est-wrap').style.display=t==='Estações'?'block':'none';
  document.getElementById('cfg-rounds-wrap').style.display=(t==='EMOM'||t==='AMRAP')?'none':'';
}

function applyCfg(){
  const type=document.getElementById('cfg-type')?.value||'For Time';
  const cap=parseInt(document.getElementById('cfg-cap')?.value)||20;
  const rounds=parseInt(document.getElementById('cfg-rounds')?.value)||null;
  const label=document.getElementById('cfg-label')?.value.trim()||'';
  const exRaw=(document.getElementById('cfg-exes')?.value||'').split('\n').map(l=>l.trim()).filter(Boolean);
  cfg={
    blockType:type,blockLabel:label,timeCap:cap,rounds:rounds||null,
    exercises:exRaw,sessionId:null,sessionDate:null,athleteId:null,blockId:null,
    stationTime:parseInt(document.getElementById('cfg-st')?.value)||45,
    transitionTime:parseInt(document.getElementById('cfg-tt')?.value)||15
  };
  status='ready';render();
}

// ── Ready screen ────────────────────────────────────────────
function renderReady(){
  const bt=cfg.blockType;
  const exes=cfg.exercises||[];
  const metaParts=[
    cfg.timeCap?`${cfg.timeCap} min`:'',
    cfg.rounds?`${cfg.rounds} rounds`:'',
    bt==='Estações'?`${cfg.stationTime||45}s / ${cfg.transitionTime||15}s transição`:''
  ].filter(Boolean);
  const exHtml=exes.map(ex=>{
    const subHtml=(bt==='Estações'&&ex.exercises?.length)
      ?`<div class="t-r-sub-list">${ex.exercises.map(se=>`<div class="t-r-sub-ex">${esc(exLabel(se))}</div>`).join('')}</div>`
      :'';
    return`<div class="t-r-ex"><span class="t-r-dot"></span><div class="t-r-ex-body">${esc(exLabel(ex))}${subHtml}</div></div>`;
  }).join('');
  return`${renderHdr()}
  <div class="t-ready-body">
    <div>
      <span class="t-badge">${esc(MODE_LBL[bt]||bt)}</span>
      <div class="t-r-label">${esc(cfg.blockLabel||'WOD')}</div>
      ${metaParts.length?`<div class="t-r-meta">${esc(metaParts.join(' · '))}</div>`:''}
    </div>
    ${exHtml?`<div class="t-r-exlist">${exHtml}</div>`:''}
    ${renderRecentes(false)}
  </div>
  <div class="t-ctrl">
    <button class="t-btn t-btn-start" onclick="startTimer()">▶ INICIAR</button>
  </div>`;
}

// ── Recentes ────────────────────────────────────────────────
function renderRecentes(showRegister){
  const hist=loadHist();
  if(!hist.length)return'';
  const items=hist.map((h,i)=>{
    const canReg=showRegister&&!!(h.sessionId);
    return`<div class="t-rec-item">
      <div class="t-rec-info">
        <div class="t-rec-name">${esc(h.blockLabel||h.blockType||'Timer')}</div>
        <div class="t-rec-t">${esc(h.totalTime||'—')}</div>
        <div class="t-rec-date">${h.date?fmtDate(h.date):''}</div>
      </div>
      ${canReg?`<button class="t-rec-btn" onclick="registerHist(${i})">REGISTRAR</button>`:''}
    </div>`;
  }).join('');
  return`<div class="t-recentes">
    <div class="t-rec-ttl">Histórico local</div>
    ${items}
  </div>`;
}

// ── Running screen ──────────────────────────────────────────
function renderRunning(){
  const bt=cfg.blockType, isPaused=status==='paused';
  const e=elapsed(), cap=capSecs(), disp=getDisplay();
  const exes=cfg.exercises||[];

  // Clock class
  let clockClass='t-clock';
  if(isPaused) clockClass+=' paused';
  else if(bt==='AMRAP'&&disp<=30) clockClass+=' warn';
  else if((bt==='For Time'||bt==='Benchmark')&&cap&&e>=cap*.85) clockClass+=' warn';

  // Context label and round info
  let clockLbl='', roundHtml='';
  if(bt==='EMOM'){
    const min=Math.floor(e/60), total=cfg.timeCap||0;
    clockLbl=isPaused?'pausado':'até o próximo';
    roundHtml=`<div class="t-round">MIN ${min+1} / ${total}</div>`;
  } else if(bt==='Estações'){
    const{idx,round}=stInfo(), phase=stPhase(), rounds=cfg.rounds||1;
    clockLbl=isPaused?'pausado':phase==='work'?'trabalhando':'transição';
    roundHtml=`<div class="t-round">EST ${idx+1}/${exes.length} · RD ${round+1}/${rounds}</div>`;
  } else {
    const lapN=splits.length, rounds=cfg.rounds;
    clockLbl=isPaused?'pausado':bt==='AMRAP'?'restando':'decorrido';
    if(lapN>0||rounds) roundHtml=`<div class="t-round">RD ${lapN+1}${rounds?'/'+rounds:''}</div>`;
  }

  const clockHtml=`
    <div class="${clockClass}">${fmt(disp)}</div>
    <div class="t-clock-lbl">${clockLbl}</div>
    ${roundHtml}`;

  // Splits
  const splitsHtml=splits.length?`<div class="t-splits">${splits.map((s,i)=>{
    const prev=i>0?splits[i-1]:0;
    return`<div class="t-split-item"><b>R${i+1} </b>${fmt(s-prev)}</div>`;
  }).join('')}</div>`:'';

  // Exercise list
  const exHtml=exes.map((ex,i)=>{
    let cls='t-ex';
    if(bt==='Estações'){const{idx}=stInfo();const ph=stPhase();if(i===idx&&ph==='work')cls+=' active';else if(i<idx&&stInfo().round===0)cls+=' done-s';}
    else if(bt==='EMOM'&&exes.length>0){const curIdx=Math.floor(elapsed()/60)%exes.length;if(i===curIdx)cls+=' active';else if(i<curIdx)cls+=' done-s';}
    const subHtml=(bt==='Estações'&&ex.exercises?.length)
      ?`<div class="t-sub-list">${ex.exercises.map(se=>`<div class="t-sub-ex">${esc(exLabel(se))}</div>`).join('')}</div>`
      :'';
    return`<div class="${cls}"><span class="t-ex-dot"></span><div class="t-ex-body">${esc(exLabel(ex))}${subHtml}</div></div>`;
  }).join('');

  const showLap=bt!=='EMOM'&&bt!=='Estações';

  return`${renderHdr()}
  <div class="t-body">
    ${renderRing(clockHtml)}
    <div class="t-scroll">
      ${splitsHtml}
      ${exHtml}
    </div>
  </div>
  <div class="t-ctrl">
    ${showLap?`<button class="t-btn t-btn-lap" onclick="doLap()">LAP</button>`:''}
    ${isPaused
      ?`<button class="t-btn t-btn-resume" onclick="resumeTimer()">▶ RETOMAR</button>`
      :`<button class="t-btn t-btn-pause" onclick="pauseTimer()">❚❚</button>`
    }
    <button class="t-btn t-btn-done" onclick="finishTimer()">✓ FIM</button>
  </div>`;
}

// ── Finished screen ─────────────────────────────────────────
function renderFinished(){
  const rounds=splits.length;
  const canReg=hasSession();
  const splitsHtml=splits.length?`
    <div class="t-fin-split-ttl">Splits por round</div>
    <div class="t-fin-split-grid">${splits.map((s,i)=>{
      const prev=i>0?splits[i-1]:0;
      return`<div class="t-fin-split-cell">
        <div class="t-fin-split-n">RD ${i+1}</div>
        <div class="t-fin-split-v">${fmt(s-prev)}</div>
      </div>`;
    }).join('')}</div>`:'';
  return`${renderHdr(false)}
  <div class="t-fin-body">
    <div class="t-fin-ttl">FINALIZADO</div>
    <div class="t-fin-time">${fmt(finalSecs)}</div>
    ${rounds?`<div class="t-fin-rounds">${rounds} ROUND${rounds!==1?'S':''}</div>`:''}
    ${splitsHtml}
    ${renderRecentes(true)}
  </div>
  <div class="t-ctrl">
    <button class="t-btn t-btn-disc" onclick="doDiscard()">DESCARTAR</button>
    ${canReg
      ?`<button class="t-btn t-btn-reg" onclick="registerResult()">REGISTRAR</button>`
      :`<button class="t-btn t-btn-close" onclick="goBack()">FECHAR</button>`
    }
  </div>`;
}

// ── Actions ────────────────────────────────────────────────
function startTimer(){
  startEpoch=Date.now();pausedMs=0;pauseStart=0;finalSecs=0;splits=[];
  lastEmomMin=-1;lastStKey=null;
  status='running';acquireWL();startTick();render();
}
function pauseTimer(){
  if(status!=='running')return;
  pauseStart=Date.now();status='paused';stopTick();saveState();render();
}
function resumeTimer(){
  if(status!=='paused')return;
  pausedMs+=Date.now()-pauseStart;pauseStart=0;
  status='running';acquireWL();startTick();render();
}
function doLap(){
  if(status!=='running')return;
  splits.push(elapsed());
  const bt=cfg.blockType;
  if(cfg.rounds&&splits.length>=cfg.rounds&&(bt==='For Time'||bt==='Benchmark')){
    finishTimer();return;
  }
  saveState();render();
}
function finishTimer(){
  finalSecs=elapsed();
  if(status==='paused')pausedMs+=Date.now()-pauseStart;
  status='finished';stopTick();
  if(wakeLock){wakeLock.release();wakeLock=null;}
  pushHist({
    blockType:cfg.blockType,blockLabel:cfg.blockLabel||cfg.blockType||'Timer',
    sessionId:cfg.sessionId,sessionDate:cfg.sessionDate,
    athleteId:cfg.athleteId,blockId:cfg.blockId,
    totalTime:fmt(finalSecs),totalSecs:finalSecs,
    splits:[...splits],date:new Date().toISOString().slice(0,10),timestamp:Date.now()
  });
  localStorage.removeItem(K_STATE);render();
}
function doDiscard(){dropHist(0);window.history.back();}
function buildScheduleUrl(sessId,sessDate,blockId,athId,perfTime,perfRounds){
  const p=new URLSearchParams();
  if(sessDate)p.set('date',sessDate);
  if(sessId)p.set('openLog',sessId);
  if(blockId)p.set('blockId',blockId);
  if(athId)p.set('athlete',athId);
  if(perfTime)p.set('prefill',perfTime);
  if(perfRounds)p.set('prefillRounds',String(perfRounds));
  return'schedule.html?'+p.toString();
}
function registerResult(){
  location.href=buildScheduleUrl(cfg.sessionId,cfg.sessionDate,cfg.blockId,cfg.athleteId,fmt(finalSecs),splits.length||'');
}
function registerHist(i){
  const h=loadHist(),e=h[i];if(!e)return;
  location.href=buildScheduleUrl(e.sessionId,e.sessionDate,e.blockId,e.athleteId,e.totalTime,e.splits?.length||'');
}
function goBack(){
  if(status==='running'){if(!confirm('Pausar e sair?'))return;pauseTimer();}
  window.history.back();
}

// ── Tick ───────────────────────────────────────────────────
function startTick(){if(tickId)return;tickId=setInterval(tick,250);}
function stopTick(){if(tickId){clearInterval(tickId);tickId=null;}}
function tick(){
  if(status!=='running')return;
  const e=elapsed();
  if(Math.floor(e)%5===0)saveState();
  if(cfg.blockType==='EMOM'){
    const min=Math.floor(e/60);
    if(lastEmomMin>=0&&min!==lastEmomMin)navigator.vibrate?.([300,100,300]);
    lastEmomMin=min;
  }
  if(cfg.blockType==='Estações'){
    const{idx}=stInfo(),phase=stPhase(),key=`${idx}-${phase}`;
    if(lastStKey!==null&&key!==lastStKey)navigator.vibrate?.(phase==='work'?[400,100,400]:[200]);
    lastStKey=key;
  }
  if(isTimeUp()){navigator.vibrate?.([500,200,500,200,500]);finishTimer();return;}
  render();
}

// ── Init ───────────────────────────────────────────────────
function init(){
  try{
    const saved=JSON.parse(localStorage.getItem(K_STATE)||'null');
    if(saved?.cfg&&(saved.status==='running'||saved.status==='paused')){
      cfg=saved.cfg;status=saved.status;
      startEpoch=saved.startEpoch;pausedMs=saved.pausedMs||0;
      pauseStart=saved.pauseStart||0;splits=saved.splits||[];finalSecs=saved.finalSecs||0;
      lastEmomMin=-1;lastStKey=null;
      if(status==='running')startTick();
      render();return;
    }
  }catch(e){}
  try{cfg=JSON.parse(localStorage.getItem(K_CFG)||'null');}catch(e){}
  if(cfg){status='ready';}else{status='cfg';cfg={blockType:'For Time',blockLabel:'',timeCap:20,rounds:null,exercises:[]};}
  render();
}

// Fix iOS Safari where 100dvh/100vh can be wrong on first paint
function fixVh(){const r=document.getElementById('root');if(r)r.style.height=window.innerHeight+'px';}
window.addEventListener('resize',fixVh);
fixVh();

init();
</script>
