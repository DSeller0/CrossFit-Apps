<head>

<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Crimson+Pro:ital,wght@0,400;0,600;1,400&family=Amarante&display=swap"/>

<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--bg);min-height:100vh;font-family:var(--lb-font);color:var(--cream);padding-bottom:72px}
/* ── Header ── */
.hdr{padding:18px 20px 14px;border-bottom:1px solid var(--divider);background:var(--bg);position:sticky;top:0;z-index:20}
.hdr-rule{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.hdr-line{flex:1;height:1px;background:linear-gradient(90deg,transparent,var(--gold2))}
.hdr-line.r{background:linear-gradient(270deg,transparent,var(--gold2))}
.hdr-diamond{width:5px;height:5px;border:1px solid var(--gold);transform:rotate(45deg);flex-shrink:0}
.brand{font-size:22px;font-weight:900;letter-spacing:8px;color:var(--cream);text-align:center}
.gym{text-align:center;font-size:9px;font-weight:700;color:var(--gold);letter-spacing:.25em;text-transform:uppercase;margin-top:1px}
.hdr-back{position:absolute;top:50%;left:20px;transform:translateY(-50%);color:var(--muted);font-size:20px;text-decoration:none;transition:color .15s;line-height:1;padding:4px}
.hdr-back:hover{color:var(--cream)}
/* ── Controls ── */
.controls{background:var(--bg);border-bottom:1px solid var(--divider);padding:12px 20px;display:flex;gap:8px;flex-wrap:wrap;align-items:center;position:sticky;top:90px;z-index:10}
.sel{font-family:var(--lb-font);font-size:13px;background:var(--stone);border:1px solid var(--divider);color:var(--cream);padding:6px 10px;outline:none;flex:1;min-width:160px}
.filter-row{display:flex;gap:4px;flex-wrap:wrap}
.fb{font-family:var(--lb-font);font-size:11px;padding:5px 10px;border:1px solid var(--divider);background:transparent;color:var(--muted);cursor:pointer;transition:all .12s}
.fb.on{background:var(--accent);color:var(--accent-text);border-color:var(--accent);font-weight:700}
/* ── Leaderboard ── */
.lb-header{background:var(--stone);padding:16px 20px 12px;border-bottom:1px solid var(--divider)}
.lb-title{font-size:16px;font-weight:900;color:var(--cream);text-transform:uppercase;letter-spacing:.06em}
.lb-meta{font-size:12px;color:var(--sub);margin-top:3px;text-transform:uppercase;letter-spacing:.05em}
.row{display:flex;align-items:center;gap:12px;padding:12px 20px;border-bottom:1px solid var(--divider);transition:background .1s}
.row:hover{background:var(--stone)}
.row.podium-0{background:rgba(255,215,0,0.06)}
.row.podium-1{background:rgba(192,192,192,0.05)}
.row.podium-2{background:rgba(205,127,50,0.05)}
.rank{font-size:16px;font-weight:900;width:30px;text-align:center;flex-shrink:0;color:var(--muted)}
.rank.p0{color:#ffd700}
.rank.p1{color:#c0c0c0}
.rank.p2{color:#cd7f32}
.dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.name{flex:1;font-size:15px;font-weight:700;color:var(--cream);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.scale-badge{font-size:10px;font-weight:700;color:var(--accent);background:rgba(74,200,192,.1);border:1px solid rgba(74,200,192,.25);padding:2px 7px;flex-shrink:0}
.perf{font-size:15px;font-weight:900;color:var(--cream);flex-shrink:0}
.perf.p0{color:#ffd700}
.perf.p1{color:#c0c0c0}
.perf.p2{color:#cd7f32}
.empty{text-align:center;padding:40px 20px;color:var(--muted);font-size:13px}
.loading{text-align:center;padding:60px 20px;color:var(--teal);font-size:14px;letter-spacing:.1em;text-transform:uppercase}
.error{text-align:center;padding:40px 20px;color:#e05050;font-size:13px}
/* ── Bottom nav ── */
.p-nav{position:fixed;bottom:0;left:0;right:0;background:#0a0807;border-top:1px solid var(--divider);display:flex;padding-bottom:env(safe-area-inset-bottom,0);z-index:30}
.p-nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:11px 4px;gap:3px;color:var(--muted);text-decoration:none;font-family:var(--lb-font);font-size:9px;font-weight:700;letter-spacing:.06em;border:none;background:none;cursor:pointer;transition:color .15s}
.p-nav-btn:hover{color:var(--sub)}
.p-nav-btn.active{color:var(--teal)}

.p-nav-ic{font-size:18px;line-height:1}
.p-nav-sep{width:1px;background:var(--divider);margin:10px 0}
@media (min-width:768px){
  .brand{font-size:26px}.gym{font-size:11px}.hdr-back{font-size:24px}
  .lb-title{font-size:19px}.lb-meta{font-size:14px}
  .rank{font-size:19px}.name{font-size:18px}.perf{font-size:18px}.scale-badge{font-size:12px}
  .sel{font-size:16px}.fb{font-size:13px}
  .p-nav-btn{font-size:11px}.p-nav-ic{font-size:22px}
  .loading{font-size:17px}.empty{font-size:16px}.error{font-size:16px}
}
</style>
  <link rel="stylesheet" crossorigin href="/CrossFit-Apps/assets/themes-BNsnrWhx.css">
</head>
<body>
<header class="hdr" style="position:relative">
  <a class="hdr-back" href="index.html" title="Início">←</a>
  <div class="hdr-rule">
    <div class="hdr-line"></div>
    <div class="hdr-diamond"></div>
    <div class="hdr-line r"></div>
  </div>
  <div class="brand">CONE</div>
  <div class="gym" id="lb-gym">Leaderboard</div>
</header>
<div id="app"><div class="loading">Carregando resultados...</div></div>
<script>
const PODIUM_COLORS=['#ffd700','#c0c0c0','#cd7f32'];
const PODIUM_LABELS=['1º','2º','3º'];
const WOD_TYPES=['WOD','For Time','AMRAP','EMOM','MetCon','HIIT'];

let cfg={};
let state=null;
let selWod='';
let scaleFilter='Todos';

function toSecs(s){if(!s)return Infinity;const p=s.split(':');return p.length===2?parseInt(p[0])*60+parseInt(p[1]):parseInt(s)||Infinity;}

function rankResults(results,blType){
  const isForTime=blType==='For Time';
  return [...results].sort((a,b)=>{
    if(isForTime) return toSecs(a.perfTime)-toSecs(b.perfTime);
    const ra=parseInt(a.perfRounds)||0,rb=parseInt(b.perfRounds)||0;
    if(ra!==rb) return rb-ra;
    return (parseInt(b.perfReps)||0)-(parseInt(a.perfReps)||0);
  });
}

function perfStr(r,blType){
  if(blType==='For Time') return r.perfTime||'—';
  const p=[];
  if(r.perfRounds) p.push(`${r.perfRounds} rds`);
  if(r.perfReps) p.push(`${r.perfReps} reps`);
  return p.join(' + ')||'—';
}

function buildWodList(){
  const list=[];
  const {sessions=[],results=[]}=state;
  const sessObj=typeof sessions==='object'&&!Array.isArray(sessions)?sessions:{};
  Object.entries(sessObj).sort(([a],[b])=>b.localeCompare(a)).forEach(([dateKey,daySessions])=>{
    (daySessions||[]).forEach(sess=>{
      (sess.blocks||[]).filter(bl=>WOD_TYPES.includes(bl.label)||WOD_TYPES.includes(bl.type)).forEach(bl=>{
        const hasRes=(results||[]).some(r=>r.date===dateKey&&r.sessionId===sess.id&&r.presence==='Presente'&&(r.blocks||[]).some(rb=>rb.blockId===bl.id&&(rb.perfTime||rb.perfRounds||rb.perfReps)));
        if(hasRes){
          const dt=new Date(dateKey+'T12:00:00').toLocaleDateString('pt-BR',{weekday:'short',day:'2-digit',month:'2-digit'});
          const label=bl.label&&bl.label!=='-'?bl.label:bl.type;
          const meta=[bl.rounds&&`${bl.rounds}rds`,bl.duration&&`CAP ${bl.duration}'`].filter(Boolean).join(' · ');
          list.push({key:`${dateKey}|${sess.id}|${bl.id}`,dateKey,sessId:sess.id,blId:bl.id,blType:bl.type,label,meta,sessName:Array.isArray(sess.mainTraining)?sess.mainTraining.join(', '):(sess.mainTraining||''),dt});
        }
      });
    });
  });
  return list;
}

function render(){
  if(!state){document.getElementById('app').innerHTML='<div class="loading">Carregando...</div>';return;}
  // flatten nested colors in config if present
  if(cfg.colors&&typeof cfg.colors==='object') Object.assign(cfg,cfg.colors);
  const {athletes=[],results=[],settings={},lbColors={}}=state;
  // Apply config overrides
  if(cfg.themeAccent) document.documentElement.style.setProperty('--accent',cfg.themeAccent);
  if(cfg.fontFamily){
    document.documentElement.style.setProperty('--lb-font',cfg.fontFamily);
    if(cfg.googleFontsUrl){const gf=document.getElementById('gfonts-lb');if(gf)gf.href=cfg.googleFontsUrl;}
  }
  if(cfg.themeAccentText) document.documentElement.style.setProperty('--accent-text',cfg.themeAccentText);
  const lbc={
    lbBg:lbColors.lbBg||'#000000',
    lbRowAlt:lbColors.lbRowAlt||'#020809',
    lbP1Bg:lbColors.lbP1Bg||'rgba(255,215,0,0.06)',
    lbP2Bg:lbColors.lbP2Bg||'rgba(192,192,192,0.05)',
    lbP3Bg:lbColors.lbP3Bg||'rgba(205,127,50,0.05)',
    lbDivider:lbColors.lbDivider||'#0d1e1e',
    lbHdrBg:lbColors.lbHdrBg||'#000000',
    lbHdrBorder:lbColors.lbHdrBorder||'#00b8d4',
    lbHdrTitle:lbColors.lbHdrTitle||'#ffffff',
    lbHdrSub:lbColors.lbHdrSub||'#00b8d4',
    lbRank:lbColors.lbRank||'#333333',
    lbP1:lbColors.lbP1||'#ffd700',
    lbP2:lbColors.lbP2||'#c0c0c0',
    lbP3:lbColors.lbP3||'#cd7f32',
    lbName:lbColors.lbName||'#ffffff',
    lbScaleText:lbColors.lbScaleText||'#00b8d4',
    lbScaleBg:lbColors.lbScaleBg||'rgba(0,184,212,0.1)',
    lbScaleBorder:lbColors.lbScaleBorder||'#00b8d4',
    lbPerf:lbColors.lbPerf||'#ffffff',
    lbFilterBg:lbColors.lbFilterBg||'#00b8d4',
    lbFilterText:lbColors.lbFilterText||'#000000',
  };
  const accent=lbc.lbHdrBorder;
  document.documentElement.style.setProperty('--accent',accent);
  document.body.style.background=lbc.lbBg||'#0a0a0a';

  const gymName=cfg.gymName||settings.gymName||'Cone';
  const wodList=buildWodList();
  const selObj=wodList.find(w=>w.key===selWod)||null;

  let wodResults=[];
  if(selObj){
    wodResults=(results||[]).filter(r=>r.date===selObj.dateKey&&r.sessionId===selObj.sessId&&r.presence==='Presente')
      .map(r=>{
        const blk=(r.blocks||[]).find(b=>b.blockId===selObj.blId)||null;
        if(!blk) return null;
        const SCALE_RANK={RX:4,Inter:3,SC:2,Adaptado:1,'-':0};
        const SCALE_NAMES={4:'RX',3:'Inter',2:'SC',1:'Adaptado',0:'-'};
        const exRows=blk.exerciseRows||[];
        let minRank=4;
        exRows.forEach(row=>{const rank=SCALE_RANK[row.scale]??0;if(rank<minRank)minRank=rank;});
        const computedScale=exRows.length>0?SCALE_NAMES[minRank]:blk.scale||'-';
        return {...r,perfTime:blk.perfTime,perfRounds:blk.perfRounds,perfReps:blk.perfReps,scale:computedScale};
      })
      .filter(r=>r&&(r.perfTime||r.perfRounds||r.perfReps));
  }
  const filtered=scaleFilter==='Todos'?wodResults:wodResults.filter(r=>r.scale===scaleFilter);
  const ranked=selObj?rankResults(filtered,selObj.blType):[];

  const scales=['Todos','RX','Inter','SC','Adaptado'];

  {const e=document.getElementById('lb-gym');if(e)e.textContent=gymName;}
  document.getElementById('app').innerHTML=`
    <div class="controls">
      <select id="wod-sel" class="sel">
        <option value="">— Selecionar WOD —</option>
        ${wodList.map(w=>`<option value="${w.key}"${w.key===selWod?' selected':''}>${w.dt}${w.sessName?' ('+w.sessName+')':''} — ${w.label}${w.meta?' · '+w.meta:''}</option>`).join('')}
      </select>
      <div class="filter-row">
        ${scales.map(s=>`<button class="fb${scaleFilter===s?' on':''}" style="${scaleFilter===s?`background:${lbc.lbFilterBg};color:${lbc.lbFilterText};border-color:${lbc.lbFilterBg}`:''}" onclick="setScale('${s}')">${s}</button>`).join('')}
      </div>
    </div>
    ${selObj?`
    <div class="lb-header" style="background:${lbc.lbHdrBg};border-bottom:3px solid ${lbc.lbHdrBorder}">
      <div class="lb-title" style="color:${lbc.lbHdrTitle}">${selObj.label}${selObj.meta?' · '+selObj.meta:''}</div>
      <div class="lb-meta" style="color:${lbc.lbHdrSub}">${selObj.dt}${selObj.sessName?' · '+selObj.sessName:''}${scaleFilter!=='Todos'?' · '+scaleFilter:''}</div>
    </div>
    <div id="lb-rows" style="background:${lbc.lbBg}">
      ${ranked.length===0?`<div class="empty" style="color:${lbc.lbRank}">Nenhum resultado para esta seleção.</div>`:
        ranked.map((r,ri)=>{
          const ath=(athletes||[]).find(a=>a.id===r.athleteId);
          const perf=perfStr(r,selObj.blType);
          const isPodium=ri<3;
          const podColors=[lbc.lbP1,lbc.lbP2,lbc.lbP3];
          const podBgs=[lbc.lbP1Bg,lbc.lbP2Bg,lbc.lbP3Bg];
          const pColor=isPodium?podColors[ri]:null;
          const rowBg=isPodium?podBgs[ri]:ri%2===0?lbc.lbRowAlt:lbc.lbBg;
          return `<div class="row" style="background:${rowBg};border-bottom-color:${lbc.lbDivider}">
            <div class="rank" style="color:${pColor||lbc.lbRank}">${isPodium?PODIUM_LABELS[ri]:`${ri+1}º`}</div>
            <div class="dot" style="background:${ath?.color||'#555'}"></div>
            <div class="name" style="color:${lbc.lbName}">${ath?.name||'—'}</div>
            ${r.scale&&r.scale!=='-'?`<span class="scale-badge" style="color:${lbc.lbScaleText};background:${lbc.lbScaleBg};border-color:${lbc.lbScaleBorder}">${r.scale}</span>`:''}
            <div class="perf" style="color:${pColor||lbc.lbPerf}">${perf}</div>
          </div>`;
        }).join('')}
    </div>`:
    `<div class="empty" style="color:${lbc.lbRank}">Selecione um WOD para ver o ranking.</div>`
    }
  `;
  document.getElementById('wod-sel')?.addEventListener('change',e=>{selWod=e.target.value;render();});
}

function setScale(s){scaleFilter=s;render();}

// ── Read URL params for deep-link from schedule.html ─────────────────────────
function applyUrlParams(){
  const p=new URLSearchParams(window.location.search);
  const wod=p.get('wod'),sessId=p.get('session'),date=p.get('date');
  if(wod&&sessId&&date){
    selWod=`${date}|${sessId}|${wod}`;
    // verify it exists in wodList
    const list=buildWodList();
    if(list.find(w=>w.key===selWod)) render();
    else{selWod='';render();}
  }
}

async function fetchState(){
  const tbls=['sessions','athletes','results','events','locations','coach_profile','settings','goals_data','lb_colors'];
  const rows=await Promise.all(tbls.map(t=>_sb.from(t).select('value').eq('id',1).maybeSingle()));
  const[s,a,r,ev,loc,cp,st,gd,lb]=rows.map(x=>x.data?.value??null);
  return{sessions:s??{},athletes:a??[],results:r??[],events:ev??{},locations:loc??[],coachProfile:cp??{},settings:st??{},athleteGoalsData:gd??{athleteGoals:{},prs:{}},lbColors:lb??{}};
}

// Fetch config + state
async function init(attempt=0){
  try{
    const [cfgData,stateData]=await Promise.all([
      fetch('./config.json?v='+Date.now()).then(r=>r.ok?r.json():{}).catch(()=>({})),
      fetchState()
    ]);
    cfg=cfgData;
    state=stateData;
    if(cfg.leaderboardTitle||cfg.appTitle) document.title=cfg.leaderboardTitle||cfg.appTitle;
    applyUrlParams();
    render();
  }catch(err){
    if(attempt<2){setTimeout(()=>init(attempt+1),2000*(attempt+1));return;}
    document.getElementById('app').innerHTML=`<div class="error"><i class="ti ti-alert-circle" style="font-size:32px"></i><br><br>Não foi possível carregar os resultados.<br><small>${err.message}</small><br><button onclick="init()" style="margin-top:12px;background:transparent;border:1px solid #1e1e1e;color:#666;font-size:13px;padding:7px 16px;border-radius:5px;cursor:pointer;font-family:inherit"><i class="ti ti-refresh"></i> Tentar novamente</button></div>`;
  }
}
init();
window.addEventListener('pageshow', e => { if (e.persisted) init().catch(() => {}); });
</script>

<script>
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('./sw.js')
      .then(reg=>{
        reg.addEventListener('updatefound',()=>{
          const newSW=reg.installing;
          newSW.addEventListener('statechange',()=>{
            if(newSW.state==='installed'&&navigator.serviceWorker.controller){
              console.log('[Cone] Nova versão disponível. Recarregue para atualizar.');
            }
          });
        });
      })
      .catch(err=>console.warn('[Cone] Service worker não registrado:',err));
  });
}
</script>
