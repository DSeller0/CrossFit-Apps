<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--bg);color:var(--cream);font-family:var(--font);min-height:100vh}
@media(max-width:699px){body{padding-bottom:64px}}

/* ── Header ── */
.hdr{padding:18px 20px 14px;border-bottom:1px solid var(--divider);background:var(--bg);position:sticky;top:0;z-index:20}
.hdr-rule{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.hdr-line{flex:1;height:1px;background:linear-gradient(90deg,transparent,var(--gold2))}
.hdr-line.r{background:linear-gradient(270deg,transparent,var(--gold2))}
.hdr-diamond{width:5px;height:5px;border:1px solid var(--gold);transform:rotate(45deg);flex-shrink:0}
.brand{font-size:22px;font-weight:900;letter-spacing:8px;color:var(--cream);text-align:center;text-shadow:0 0 30px rgba(216,168,64,.12)}
.hdr-foot{display:flex;align-items:center;justify-content:center;gap:16px;margin-top:2px}
.gym{font-size:9px;font-weight:700;color:var(--gold);letter-spacing:.25em;text-transform:uppercase}
.coach-lnk{font-size:9px;color:var(--dim);text-decoration:none;letter-spacing:.06em;transition:color .15s}
.coach-lnk:hover{color:var(--cream)}

/* ── Two-pane layout ── */
.layout{display:flex;flex-direction:column;max-width:1100px;margin:0 auto}
@media(min-width:700px){
  .layout{flex-direction:row;align-items:flex-start}
  .pane-left{width:400px;flex-shrink:0;position:sticky;top:90px;max-height:calc(100vh - 90px);overflow-y:auto;border-right:1px solid var(--divider)}
  .pane-right{flex:1;padding:28px 24px}
}

/* ── Sessions pane ── */
.pane-left{padding:16px 16px 20px}
.pane-left::-webkit-scrollbar{width:3px}
.pane-left::-webkit-scrollbar-track{background:transparent}
.pane-left::-webkit-scrollbar-thumb{background:var(--dim)}
.pane-left{scrollbar-width:thin;scrollbar-color:var(--dim) transparent}

/* ── Day label ── */
.day-lbl-row{display:flex;align-items:center;gap:10px;margin:16px 0 8px}
.day-lbl-row:first-child{margin-top:0}
.dlr-line{flex:1;height:1px;background:var(--divider)}
.dlr-text{font-size:9px;font-weight:900;letter-spacing:.18em;text-transform:uppercase;white-space:nowrap;padding:0 4px}
.dlr-text.today{color:var(--teal)}
.dlr-text.past{color:var(--muted)}
.dlr-text.future{color:var(--sub)}

/* ── Session card ── */
.sess-card{background:var(--stone);border:1px solid var(--divider);margin-bottom:8px;position:relative;cursor:pointer}
.sess-card::before,.sess-card::after{content:'';position:absolute;width:8px;height:8px}
.sess-card::before{top:-1px;left:-1px;border-top:1px solid var(--gold2);border-left:1px solid var(--gold2)}
.sess-card::after{bottom:-1px;right:-1px;border-bottom:1px solid var(--gold2);border-right:1px solid var(--gold2)}
.sess-card.today{border-color:rgba(74,200,192,.3);box-shadow:0 0 18px rgba(74,200,192,.06)}
.sess-card.today::before,.sess-card.today::after{border-color:var(--teal)}
.sess-card.past{opacity:.72}

/* Card header row */
.card-hdr{display:flex;align-items:center;justify-content:space-between;padding:11px 14px;gap:10px;user-select:none}
.card-tag{font-size:9px;font-weight:900;letter-spacing:.18em;text-transform:uppercase;color:var(--muted)}
.sess-card.today .card-tag{color:var(--teal)}
.card-chevron{width:6px;height:6px;border-right:1.5px solid var(--muted);border-bottom:1.5px solid var(--muted);transform:rotate(45deg);transition:transform .2s;flex-shrink:0}
.sess-card.collapsed .card-chevron{transform:rotate(-45deg)}

/* Compact (collapsed) */
.sess-compact{padding:0 14px 10px;display:flex;align-items:center;justify-content:space-between}
.sess-card:not(.collapsed) .sess-compact{display:none}
.sess-card.collapsed .sess-compact{display:flex}
.compact-name{font-size:13px;font-weight:700;color:var(--sub)}
.compact-badge{font-size:10px;color:var(--dim);background:var(--stone2);border:1px solid var(--divider);padding:2px 7px}

/* Full body (expanded) */
.card-body{padding:0 14px 14px}
.sess-card.collapsed .card-body{display:none}
.card-name{font-size:16px;font-weight:900;color:var(--cream);margin-bottom:10px;line-height:1.2}

/* ── Block pills ── */
.blocks{display:flex;flex-direction:column;gap:5px;margin-bottom:12px}
.blk-pill{display:flex;align-items:center;gap:8px;background:var(--stone2);border:1px solid var(--divider);padding:7px 11px}
.blk-dot{width:8px;height:8px;transform:rotate(45deg);flex-shrink:0}
.blk-dot.wod{background:var(--teal)}
.blk-dot.warm{background:var(--gold)}
.blk-dot.str{background:#c87850}
.blk-dot.skill{background:#9070d8}
.blk-dot.core{background:#70a870}
.blk-dot.mob{background:#5090d8}
.blk-type{font-size:10px;font-weight:900;letter-spacing:.06em;text-transform:uppercase}
.blk-type.wod{color:var(--teal)}
.blk-type.warm{color:var(--gold)}
.blk-type.str{color:#c87850}
.blk-type.skill{color:#9070d8}
.blk-type.core{color:#70a870}
.blk-type.mob{color:#5090d8}
.blk-sep{color:var(--dim);font-size:11px}
.blk-label{font-size:11px;color:var(--sub);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.blk-meta{font-size:10px;color:var(--muted);margin-left:auto;white-space:nowrap;flex-shrink:0}

/* Footer */
.card-footer{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-top:2px}
.reg-count{font-size:11px;color:var(--muted);line-height:1.3}
.btn-reg{background:var(--teal);color:#000;font-family:var(--font);font-size:12px;font-weight:900;padding:8px 16px;border:none;cursor:pointer;text-decoration:none;letter-spacing:.04em;white-space:nowrap;transition:opacity .15s;display:inline-block}
.btn-reg:hover{opacity:.85}
.day-empty{font-size:12px;color:var(--dim);padding:6px 0;font-style:italic}

/* ── Right pane nav grid ── */
.pane-right{display:none}
@media(min-width:700px){.pane-right{display:block}}
.right-title{font-size:9px;font-weight:900;color:var(--gold);letter-spacing:.2em;text-transform:uppercase;margin-bottom:16px}
.nav-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.nav-tile{background:var(--stone);border:1px solid var(--divider);padding:20px 12px;text-align:center;text-decoration:none;display:block;position:relative;transition:border-color .15s,background .15s}
.nav-tile::before,.nav-tile::after{content:'';position:absolute;width:6px;height:6px}
.nav-tile::before{top:-1px;left:-1px;border-top:1px solid var(--gold2);border-left:1px solid var(--gold2)}
.nav-tile::after{bottom:-1px;right:-1px;border-bottom:1px solid var(--gold2);border-right:1px solid var(--gold2)}
.nav-tile:hover{border-color:rgba(74,200,192,.5);background:rgba(74,200,192,.04)}
.nav-tile:hover .tile-ic,.nav-tile:hover .tile-lbl{color:var(--teal)}
.tile-ic{font-size:22px;display:block;margin-bottom:6px}
.tile-lbl{font-size:9px;font-weight:700;color:var(--muted);letter-spacing:.1em;text-transform:uppercase}

/* ── Loading / error ── */
.loading{text-align:center;padding:48px 20px;color:var(--muted);font-size:11px;letter-spacing:.14em;text-transform:uppercase}
.error-msg{text-align:center;padding:48px 20px;color:var(--muted);font-size:13px;line-height:1.8}

/* ── Mobile nav ── */
.mobile-nav{position:fixed;bottom:0;left:0;right:0;background:#0a0807;border-top:1px solid var(--divider);display:flex;padding-bottom:env(safe-area-inset-bottom,0);z-index:40}
@media(min-width:700px){.mobile-nav{display:none}}
.mn-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:11px 4px;gap:3px;color:var(--muted);text-decoration:none;font-family:var(--font);font-size:9px;font-weight:700;letter-spacing:.06em;border:none;background:none;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:color .15s}
.mn-btn:active{color:var(--teal)}
.mn-ic{font-size:18px;line-height:1}
.mn-sep{width:1px;background:var(--divider);margin:10px 0}

/* ── Slide-up sheet ── */
#overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:50}
#overlay.open{display:block}
#sheet{position:fixed;left:0;right:0;bottom:0;background:var(--stone);border-top:1px solid var(--divider);transform:translateY(100%);transition:transform .3s ease;z-index:51;padding-bottom:env(safe-area-inset-bottom,0)}
#sheet.open{transform:translateY(0)}
.sheet-handle{width:36px;height:4px;background:var(--divider);border-radius:2px;margin:12px auto 16px}
.sheet-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--divider);border-top:1px solid var(--divider);margin-bottom:1px}
.sheet-tile{background:var(--stone);padding:18px 8px;text-align:center;text-decoration:none;display:flex;flex-direction:column;align-items:center;gap:6px;-webkit-tap-highlight-color:transparent}
.sheet-tile:active{background:var(--stone2)}
.sheet-ic{font-size:22px;line-height:1}
.sheet-lbl{font-size:9px;font-weight:700;color:var(--muted);letter-spacing:.08em;text-transform:uppercase}
.sheet-close{display:block;width:100%;padding:14px;font-family:var(--font);font-size:12px;font-weight:700;color:var(--muted);background:none;border:none;border-top:1px solid var(--divider);cursor:pointer;letter-spacing:.08em;text-transform:uppercase}

/* ── PWA banner ── */
#pwa-banner{position:fixed;bottom:calc(58px + env(safe-area-inset-bottom,0));left:0;right:0;display:flex;align-items:center;gap:10px;background:var(--stone);border-top:1px solid var(--divider);padding:10px 16px;z-index:45;transform:translateY(100%);opacity:0;transition:transform .3s ease,opacity .3s ease;pointer-events:none}
#pwa-banner.show{transform:translateY(0);opacity:1;pointer-events:auto}
#pwa-banner .pwa-icon{width:36px;height:36px;flex-shrink:0}
#pwa-banner .pwa-text{flex:1;min-width:0}
#pwa-banner .pwa-title{font-size:13px;font-weight:700;color:var(--cream)}
#pwa-banner .pwa-sub{font-size:11px;color:var(--sub);margin-top:1px}
#pwa-banner .pwa-install{background:var(--teal);color:#000;font-family:var(--font);font-size:12px;font-weight:900;padding:7px 14px;border:none;cursor:pointer;white-space:nowrap;flex-shrink:0}
#pwa-banner .pwa-dismiss{background:none;border:none;color:var(--muted);cursor:pointer;font-size:18px;line-height:1;padding:4px;flex-shrink:0}
@media (min-width:768px){
  .brand{font-size:26px}.gym{font-size:11px}.coach-lnk{font-size:11px}
  .card-name{font-size:19px}.compact-name{font-size:16px}.compact-badge{font-size:12px}
  .card-tag{font-size:11px}.dlr-text{font-size:11px}
  .blk-type{font-size:12px}.blk-sep{font-size:13px}.blk-label{font-size:13px}.blk-meta{font-size:12px}
  .reg-count{font-size:13px}.btn-reg{font-size:14px}.day-empty{font-size:14px}
  .right-title{font-size:11px}.tile-ic{font-size:26px}.tile-lbl{font-size:11px}
  .loading{font-size:13px}.error-msg{font-size:16px}
  #pwa-banner .pwa-title{font-size:16px}#pwa-banner .pwa-sub{font-size:13px}
  .mn-btn{font-size:11px}.mn-ic{font-size:22px}
}
</style>
</head>

<script>
const _sb = supabase.createClient(
  'https://crsalcpvsedmiabkeibp.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNyc2FsY3B2c2VkbWlhYmtlaWJwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEyNjkxNDgsImV4cCI6MjA5Njg0NTE0OH0.OuVSJRFgTp5C4rSM9Wi_fT2Q2RwpHEIIkUOdBNxUTJw'
);

const WOD_TYPES    = new Set(['WOD','For Time','AMRAP','EMOM','MetCon','HIIT']);
const STRENGTH_T   = new Set(['Força','Weightlifting','Gymnastics']);
const WARM_T       = new Set(['Aquecimento','Warm-up']);
const CORE_T       = new Set(['Core','Abdômen']);
const MOB_T        = new Set(['Mobilidade','Flexibilidade','Cool-down']);

function dateKey(offset) {
  const d = new Date();
  d.setDate(d.getDate() + offset);
  return [d.getFullYear(), String(d.getMonth()+1).padStart(2,'0'), String(d.getDate()).padStart(2,'0')].join('-');
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function blockCls(type) {
  if (WOD_TYPES.has(type))  return 'wod';
  if (STRENGTH_T.has(type)) return 'str';
  if (WARM_T.has(type))     return 'warm';
  if (CORE_T.has(type))     return 'core';
  if (MOB_T.has(type))      return 'mob';
  return 'skill';
}

function renderBlock(b) {
  const cls = blockCls(b.type);
  const hasLabel = b.label && b.label !== b.type;
  const isWod = WOD_TYPES.has(b.type);
  let meta = '';
  if (b.duration) meta = isWod ? `Cap ${b.duration}'` : `${b.duration}'`;
  else if (b.stationRepeat) meta = `${b.stationRepeat}×`;
  return `<div class="blk-pill">
    <div class="blk-dot ${cls}"></div>
    <span class="blk-type ${cls}">${esc(b.type)}</span>
    ${hasLabel ? `<span class="blk-sep">·</span><span class="blk-label">${esc(b.label)}</span>` : ''}
    ${meta ? `<span class="blk-meta">${meta}</span>` : ''}
  </div>`;
}

function renderCard(sess, dk, count, isToday, isFuture, firstOfDay) {
  const logUrl = `results.html?session=${encodeURIComponent(sess.id)}`;
  const blocks  = sess.blocks || [];
  const expanded = isToday && firstOfDay;
  const cardCls = `sess-card${isToday ? ' today' : (!isFuture ? ' past' : '')}${expanded ? '' : ' collapsed'}`;
  const tag = isToday ? '◈ Sessão do dia' : (isFuture ? 'Próxima' : 'Anterior');
  const DAYS_PT = ['Domingo','Segunda-feira','Terça-feira','Quarta-feira','Quinta-feira','Sexta-feira','Sábado'];
  const [_y, _m, _d] = dk.split('-').map(Number);
  const name = sess.sessionName || sess.name || DAYS_PT[new Date(_y, _m - 1, _d).getDay()];
  const countLabel = count === 0 ? 'Seja o primeiro' : count === 1 ? '1 resultado' : `${count} resultados`;

  return `<div class="${cardCls}" id="sc-${esc(sess.id)}">
    <div class="card-hdr" onclick="toggleCard(this)">
      <span class="card-tag">${tag}</span>
      <div class="card-chevron"></div>
    </div>
    <div class="sess-compact">
      <span class="compact-name">${esc(name)}</span>
      <span class="compact-badge">${blocks.length} bloco${blocks.length !== 1 ? 's' : ''}</span>
    </div>
    <div class="card-body">
      <div class="card-name">${esc(name)}</div>
      ${blocks.length ? `<div class="blocks">${blocks.map(renderBlock).join('')}</div>` : ''}
      <div class="card-footer">
        <span class="reg-count" id="rc-${esc(sess.id)}">${countLabel}</span>
        ${!isFuture ? `<a class="btn-reg" href="${logUrl}">Registrar →</a>` : ''}
      </div>
    </div>
  </div>`;
}

function renderDay(dk, sessions, countBySess, offset) {
  const isToday  = offset === 0;
  const isFuture = offset > 0;
  const labels   = { '-1': 'Ontem', '0': '◈ Hoje', '1': 'Amanhã' };
  const labelCls = isToday ? 'today' : (isFuture ? 'future' : 'past');
  const label    = labels[String(offset)] || dk;

  const labelRow = `<div class="day-lbl-row">
    <div class="dlr-line"></div>
    <span class="dlr-text ${labelCls}">${label}</span>
    <div class="dlr-line"></div>
  </div>`;

  if (!sessions.length) {
    return labelRow + `<div class="day-empty">Nenhum treino programado.</div>`;
  }

  return labelRow + sessions.map((sess, i) =>
    renderCard(sess, dk, countBySess[sess.id] || 0, isToday, isFuture, i === 0)
  ).join('');
}

async function main() {
  const todayDK = dateKey(0);
  const yesterDK = dateKey(-1);
  const tomorDK  = dateKey(1);

  const [sessRes, resRes, settRes] = await Promise.all([
    _sb.from('sessions').select('value').eq('id',1).single(),
    _sb.from('results').select('value').eq('id',1).single(),
    _sb.from('settings').select('value').eq('id',1).maybeSingle(),
  ]);


  const allSessions = sessRes.data?.value || {};
  const allResults  = resRes.data?.value || [];

  // Sync theme from Supabase settings
  const _storedSettings = settRes.data?.value || {};
  if (_storedSettings.theme) {
    const _cur = localStorage.getItem('cone_theme');
    if (_cur !== _storedSettings.theme) {
      localStorage.setItem('cone_theme', _storedSettings.theme);
      document.documentElement.className =
        document.documentElement.className.replace(/\btheme-\S+/g,'').trim() + ' theme-' + _storedSettings.theme;
    }
  }

  const countBySess = {};
  allResults.forEach(r => {
    if (r.sessionId) countBySess[r.sessionId] = (countBySess[r.sessionId] || 0) + 1;
  });

  // Point registrar tiles to today's first session
  const todaySessions = allSessions[todayDK] || [];
  if (todaySessions.length) {
    const regUrl = `results.html?session=${encodeURIComponent(todaySessions[0].id)}`;
    document.getElementById('reg-tile')?.setAttribute('href', regUrl);
    document.getElementById('sheet-reg')?.setAttribute('href', regUrl);
  }

  document.getElementById('sessionsPane').innerHTML = [
    renderDay(yesterDK, allSessions[yesterDK] || [], countBySess, -1),
    renderDay(todayDK,  todaySessions,               countBySess,  0),
    renderDay(tomorDK,  allSessions[tomorDK]  || [], countBySess,  1),
  ].join('');
}

async function refreshCounts() {
  const { data } = await _sb.from('results').select('value').eq('id', 1).single();
  const results = data?.value || [];
  const countBySess = {};
  results.forEach(r => { if (r.sessionId) countBySess[r.sessionId] = (countBySess[r.sessionId] || 0) + 1; });
  document.querySelectorAll('[id^="rc-"]').forEach(el => {
    const sessId = el.id.replace('rc-', '');
    const count  = countBySess[sessId] || 0;
    el.textContent = count === 0 ? 'Seja o primeiro' : count === 1 ? '1 resultado' : `${count} resultados`;
  });
}

function toggleCard(hdr) {
  hdr.closest('.sess-card').classList.toggle('collapsed');
}

function openSheet()  {
  document.getElementById('overlay').classList.add('open');
  document.getElementById('sheet').classList.add('open');
}
function closeSheet() {
  document.getElementById('overlay').classList.remove('open');
  document.getElementById('sheet').classList.remove('open');
}
(function() {
  let sy = 0;
  const sh = document.getElementById('sheet');
  sh.addEventListener('touchstart', e => { sy = e.touches[0].clientY; }, { passive:true });
  sh.addEventListener('touchend',   e => { if (e.changedTouches[0].clientY - sy > 60) closeSheet(); }, { passive:true });
})();

main()
  .then(() => setInterval(refreshCounts, 30000))
  .catch(err => {
    document.getElementById('sessionsPane').innerHTML =
      `<div class="error-msg">⚠️ Erro ao carregar.<br>
        <span style="font-size:12px;color:var(--muted)">${esc(err.message)}</span>
      </div>`;
  });

window.addEventListener('pageshow', e => {
  if (e.persisted) main().catch(() => {});
});

// ── PWA ───────────────────────────────────────────────────────────────────────
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(() => {});
}
(function() {
  const KEY = 'cone_pwa_dismissed';
  if (localStorage.getItem(KEY)) return;
  let deferredPrompt = null;
  const banner = document.getElementById('pwa-banner');
  window.addEventListener('beforeinstallprompt', e => {
    e.preventDefault();
    deferredPrompt = e;
    setTimeout(() => banner.classList.add('show'), 2500);
  });
  document.getElementById('pwa-install-btn').addEventListener('click', () => {
    if (!deferredPrompt) return;
    deferredPrompt.prompt();
    deferredPrompt.userChoice.then(() => {
      deferredPrompt = null;
      banner.classList.remove('show');
      localStorage.setItem(KEY, '1');
    });
  });
  document.getElementById('pwa-dismiss-btn').addEventListener('click', () => {
    banner.classList.remove('show');
    localStorage.setItem(KEY, '1');
  });
  window.addEventListener('appinstalled', () => {
    banner.classList.remove('show');
    deferredPrompt = null;
  });
})();
</script>
