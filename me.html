<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<meta name="description" content="Cone — Meu Perfil"/>
<title>Meu Perfil · Cone</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Raleway:wght@400;700;900&display=swap"/>

<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0b09;--stone:#161210;--stone2:#1e1a16;
  --divider:#2a231c;--gold:#d8a840;--gold2:#b88820;
  --teal:#4ac8c0;--cream:#f0e8d0;--sub:#c8b090;
  --muted:#806850;--dim:#554a3a;
  --rx:#4ac8c0;--inter:#4a90d8;--sc:#d8904a;--adp:#9070d8;
  --font:'Raleway',sans-serif;
}
html,body{background:var(--bg);color:var(--cream);font-family:var(--font);min-height:100vh;padding-bottom:70px}

/* ── Header ── */
.hdr{padding:18px 20px 14px;border-bottom:1px solid var(--divider);background:var(--bg);position:relative}
.hdr-rule{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.hdr-line{flex:1;height:1px;background:linear-gradient(90deg,transparent,var(--gold2))}
.hdr-line.r{background:linear-gradient(270deg,transparent,var(--gold2))}
.hdr-diamond{width:5px;height:5px;border:1px solid var(--gold);transform:rotate(45deg);flex-shrink:0}
.brand{font-size:22px;font-weight:900;letter-spacing:8px;color:var(--cream);text-align:center}
.gym{text-align:center;font-size:9px;font-weight:700;color:var(--gold);letter-spacing:.25em;text-transform:uppercase;margin-top:1px}
.hdr-back{position:absolute;top:50%;left:14px;transform:translateY(-50%);color:var(--muted);font-size:20px;text-decoration:none;transition:color .15s;padding:4px}
.hdr-back:hover{color:var(--cream)}

/* ── Hero ── */
.hero{padding:20px 14px 14px;border-bottom:1px solid var(--divider);display:flex;align-items:center;gap:14px;position:relative}
.ath-avatar{width:56px;height:56px;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:900;color:#000;flex-shrink:0;position:relative}
.ath-avatar::before,.ath-avatar::after{content:'';position:absolute;width:8px;height:8px}
.ath-avatar::before{top:-2px;left:-2px;border-top:2px solid var(--gold);border-left:2px solid var(--gold)}
.ath-avatar::after{bottom:-2px;right:-2px;border-bottom:2px solid var(--gold);border-right:2px solid var(--gold)}
.hero-name{font-size:22px;font-weight:900;color:var(--cream);line-height:1.1}
.hero-sub{font-size:11px;color:var(--sub);margin-top:4px}
.hero-since{font-size:10px;color:var(--muted);margin-top:2px}
.streak-badge{position:absolute;top:20px;right:14px;text-align:center}
.streak-num{font-size:28px;font-weight:900;color:var(--gold);line-height:1}
.streak-lbl{font-size:8px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em}
.streak-flame{font-size:12px}

/* ── Stats row ── */
.stats-row{display:flex;border-bottom:1px solid var(--divider)}
.stat-cell{flex:1;padding:14px 8px;text-align:center;border-right:1px solid var(--divider)}
.stat-cell:last-child{border-right:none}
.stat-num{font-size:30px;font-weight:900;color:var(--teal);line-height:1}
.stat-lbl{font-size:8px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-top:4px}

/* ── Tabs ── */
.tabs{display:flex;border-bottom:1px solid var(--divider)}
.tab{flex:1;padding:9px 4px;background:none;border:none;border-right:1px solid var(--divider);color:var(--muted);cursor:pointer;font-family:var(--font);display:flex;flex-direction:column;align-items:center;gap:2px;font-size:8px;font-weight:900;letter-spacing:.05em;text-transform:uppercase;transition:all .12s;-webkit-tap-highlight-color:transparent}
.tab:last-child{border-right:none}
.tab.active{color:var(--gold);background:rgba(216,168,64,.06);border-bottom:2px solid var(--gold);margin-bottom:-1px}
.tab-rune{font-size:16px;line-height:1;letter-spacing:0}

/* ── Panels ── */
.panel{display:none;animation:panelIn .15s ease}
.panel.active{display:block}
@keyframes panelIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

/* ── Section title ── */
.sec-title{font-size:8px;font-weight:900;color:var(--gold);letter-spacing:.22em;text-transform:uppercase;padding:16px 14px 10px;display:flex;align-items:center;gap:8px}
.sec-title::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,rgba(216,168,64,.3),transparent)}

/* ── Week dots ── */
.week-wrap{padding:0 14px 16px}
.week-strip{display:flex;gap:4px}
.week-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:5px}
.week-dot{width:32px;height:32px;border:1px solid var(--divider);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--muted)}
.week-dot.done{background:var(--teal);border-color:var(--teal);color:#000}
.week-dot.today-empty{border-color:var(--teal);color:var(--teal)}
.week-dot.future{opacity:.25}
.week-lbl{font-size:8px;color:var(--muted);font-weight:700;letter-spacing:.04em;text-transform:uppercase}

/* ── 28-day heatmap ── */
.heatmap{padding:0 14px 16px}
.hm-hdrs{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:4px}
.hm-hdr{font-size:8px;color:var(--muted);text-align:center;font-weight:700;letter-spacing:.04em}
.hm-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.hm-cell{height:10px;background:var(--stone);border:1px solid var(--divider)}
.hm-cell.has{background:rgba(74,200,192,.65);border-color:rgba(74,200,192,.85)}
.hm-cell.today{border-color:var(--gold)}
.hm-cell.today.has{background:rgba(74,200,192,.65);border-color:var(--teal)}
.hm-cell.future{opacity:.2}

/* ── Scale section ── */
.scale-wrap{padding:0 14px 16px}
.hp-cols{display:flex;gap:6px}
.hp-col{flex:1;display:flex;flex-direction:column;align-items:center}
.hp-col-pct{font-size:11px;font-weight:700;color:var(--gold);margin-bottom:3px}
.hp-col-blocks{display:flex;flex-direction:column;gap:2px;width:100%}
.hp-col-lbl{font-size:8px;font-weight:700;color:var(--sub);margin-top:5px;text-transform:uppercase;letter-spacing:.04em;text-align:center}
.hp-vblock{width:100%;height:12px;background:var(--stone2);border:1px solid var(--divider);position:relative;overflow:hidden}
.hp-vfill{position:absolute;bottom:0;left:0;right:0}
.stat-pair{display:flex;gap:12px;padding:0 14px;margin-bottom:14px}
.stat-half{flex:1;background:var(--stone);border:1px solid var(--divider);padding:12px;text-align:center;position:relative}
.stat-half::before{content:'';position:absolute;top:-1px;left:-1px;width:6px;height:6px;border-top:1px solid var(--gold2);border-left:1px solid var(--gold2)}
.stat-half::after{content:'';position:absolute;bottom:-1px;right:-1px;width:6px;height:6px;border-bottom:1px solid var(--gold2);border-right:1px solid var(--gold2)}
.sh-val{font-size:22px;font-weight:900;color:var(--gold);line-height:1}
.sh-lbl{font-size:8px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-top:4px}

/* ── Milestones ── */
.milestone-list{padding:0 14px 16px;display:flex;flex-direction:column;gap:5px}
.ms{background:var(--stone);border:1px solid var(--divider);padding:10px 14px;display:flex;align-items:center;gap:10px;position:relative}
.ms.done{border-color:rgba(216,168,64,.4)}
.ms.done::before{content:'';position:absolute;top:-1px;left:-1px;width:5px;height:5px;border-top:1px solid var(--gold);border-left:1px solid var(--gold)}
.ms-icon{font-size:14px;flex-shrink:0}
.ms-name{font-size:11px;font-weight:700;color:var(--muted);flex:1}
.ms.done .ms-name{color:var(--cream)}
.ms-tag{font-size:8px;font-weight:900;color:var(--dim);padding:1px 6px;border:1px solid var(--dim)}
.ms.done .ms-tag{color:var(--gold);border-color:rgba(216,168,64,.4)}

/* ── Recent results ── */
.recent-wrap{padding:0 14px 16px;display:flex;flex-direction:column;gap:6px}
.rc{background:var(--stone);border:1px solid var(--divider);padding:12px 14px;position:relative}
.rc::before,.rc::after{content:'';position:absolute;width:6px;height:6px}
.rc::before{top:-1px;left:-1px;border-top:1px solid var(--gold2);border-left:1px solid var(--gold2)}
.rc::after{bottom:-1px;right:-1px;border-bottom:1px solid var(--gold2);border-right:1px solid var(--gold2)}
.rc-top{display:flex;align-items:baseline;gap:8px;margin-bottom:6px}
.rc-date{font-size:10px;font-weight:700;color:var(--teal);letter-spacing:.06em}
.rc-sess{font-size:13px;font-weight:900;color:var(--cream);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rc-blocks{display:flex;flex-direction:column;gap:4px}
.rc-blk{background:var(--stone2);border:1px solid var(--divider);padding:5px 10px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.rc-type{font-size:9px;font-weight:900;color:var(--teal);letter-spacing:.06em;text-transform:uppercase}
.rc-scale{font-size:8px;font-weight:900;padding:1px 5px;letter-spacing:.04em}

/* ── Picker ── */
.picker-wrap{margin:28px auto;padding:0 14px}
.picker-title{font-size:22px;font-weight:900;color:var(--cream);margin-bottom:4px}
.picker-sub{font-size:13px;color:var(--sub);margin-bottom:20px}
.picker-input{width:100%;background:var(--stone);border:1px solid var(--divider);color:var(--cream);font-family:var(--font);font-size:15px;padding:12px 16px;outline:none;transition:border-color .15s}
.picker-input:focus{border-color:var(--teal)}
.picker-input::placeholder{color:var(--muted)}
.picker-list{margin-top:10px;display:flex;flex-direction:column;gap:6px}
.picker-item{background:var(--stone);border:1px solid var(--divider);padding:13px 16px;cursor:pointer;display:flex;align-items:center;gap:12px;transition:border-color .15s;text-decoration:none;position:relative}
.picker-item::before,.picker-item::after{content:'';position:absolute;width:7px;height:7px}
.picker-item::before{top:-1px;left:-1px;border-top:1px solid var(--gold2);border-left:1px solid var(--gold2)}
.picker-item::after{bottom:-1px;right:-1px;border-bottom:1px solid var(--gold2);border-right:1px solid var(--gold2)}
.picker-item:hover{border-color:rgba(74,200,192,.35)}
.ath-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.picker-name{font-size:15px;font-weight:700;color:var(--cream)}
.picker-empty{text-align:center;padding:24px 0;font-size:13px;color:var(--muted)}

/* ── Bottom nav ── */
.p-nav{position:fixed;bottom:0;left:0;right:0;background:#0a0807;border-top:1px solid var(--divider);display:flex;padding-bottom:env(safe-area-inset-bottom,0);z-index:30}
.p-nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:11px 4px;gap:3px;color:var(--muted);text-decoration:none;font-family:var(--font);font-size:9px;font-weight:700;letter-spacing:.06em;border:none;background:none;cursor:pointer;transition:color .15s}
.p-nav-btn:hover{color:var(--sub)}
.p-nav-btn.active{color:var(--teal)}
.p-nav-ic{font-size:18px;line-height:1}
.p-nav-sep{width:1px;background:var(--divider);margin:10px 0}
.center-msg{text-align:center;padding:64px 14px;color:var(--muted);font-size:13px;line-height:1.8}
</style>
</head>

const WOD_TYPES=new Set(['WOD','For Time','AMRAP','EMOM','MetCon','HIIT']);
const SCALE_ORDER=['RX','Inter','SC','Adaptado'];
const SCALE_COLOR={RX:'#4ac8c0',Inter:'#4a90d8',SC:'#d8904a',Adaptado:'#9070d8'};
const SCALE_BORDER={RX:'rgba(74,200,192,.3)',Inter:'rgba(74,144,216,.3)',SC:'rgba(216,144,74,.3)',Adaptado:'rgba(144,112,216,.3)'};
const WEEK_LABELS=['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
const CAL_HDRS=['D','S','T','Q','Q','S','S'];

function toISO(d){return[d.getFullYear(),String(d.getMonth()+1).padStart(2,'0'),String(d.getDate()).padStart(2,'0')].join('-')}
function todayISO(){return toISO(new Date())}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function fmtDateLong(iso){return new Date(iso+'T12:00:00').toLocaleDateString('pt-BR',{month:'long',year:'numeric'})}
function fmtDateShort(iso){return new Date(iso+'T12:00:00').toLocaleDateString('pt-BR',{day:'numeric',month:'short'})}
function initials(name){return name.trim().split(/\s+/).map(w=>w[0]).slice(0,2).join('').toUpperCase()}
function isoWeekDates(){
  const today=new Date(),dow=today.getDay();
  const sun=new Date(today);sun.setDate(today.getDate()-dow);
  return Array.from({length:7},(_,i)=>{const d=new Date(sun);d.setDate(sun.getDate()+i);return toISO(d)});
}
function calcStreak(sorted){
  if(!sorted.length)return 0;
  const dates=[...new Set(sorted.map(r=>r.date))].sort().reverse();
  const today=todayISO(),yesterday=toISO(new Date(Date.now()-86400000));
  if(dates[0]!==today&&dates[0]!==yesterday)return 0;
  let streak=0,expected=dates[0];
  for(const d of dates){if(d===expected){streak++;const p=new Date(expected+'T12:00:00');p.setDate(p.getDate()-1);expected=toISO(p);}else break;}
  return streak;
}

let currentTab=0;
function setTab(i){
  document.querySelectorAll('.tab').forEach((t,j)=>t.classList.toggle('active',j===i));
  document.querySelectorAll('.panel').forEach((p,j)=>p.classList.toggle('active',j===i));
  currentTab=i;
}

function renderPicker(athletes){
  document.getElementById('root').innerHTML=`
    <header class="hdr" style="position:relative">
      <a class="hdr-back" href="index.html">←</a>
      <div class="hdr-rule"><div class="hdr-line"></div><div class="hdr-diamond"></div><div class="hdr-line r"></div></div>

      <div class="picker-list" id="pickerList"></div>
    </div>`;
  const sorted=[...athletes].sort((a,b)=>a.name.localeCompare(b.name,'pt-BR'));
  function renderList(q){
    const q2=q.trim().toLowerCase();
    const matches=q2?sorted.filter(a=>a.name.toLowerCase().includes(q2)):sorted;
    const list=document.getElementById('pickerList');if(!list)return;
    if(!matches.length){list.innerHTML='<div class="picker-empty">Nenhum atleta encontrado.</div>';return;}
    list.innerHTML=matches.map(a=>`<a class="picker-item" href="me.html?id=${esc(a.id)}"><span class="ath-dot" style="background:${esc(a.color||'#4ac8c0')}"></span><span class="picker-name">${esc(a.name)}</span></a>`).join('');
  }
  renderList('');
  document.getElementById('pickerQ').addEventListener('input',e=>renderList(e.target.value));
}

function renderProfile(athlete,myResults,allSessions){
  const today=todayISO();
  const color=athlete.color||'#4ac8c0';
  const sorted=[...myResults].sort((a,b)=>b.date.localeCompare(a.date));
  const total=sorted.length;
  const nowY=new Date().getFullYear(),nowM=new Date().getMonth()+1;
  const thisMonth=sorted.filter(r=>{const[y,m]=r.date.split('-').map(Number);return y===nowY&&m===nowM}).length;
  const weekISOs=isoWeekDates();
  const weekDates=new Set(weekISOs);
  const thisWeek=sorted.filter(r=>weekDates.has(r.date)).length;
  const earliest=sorted.length?sorted[sorted.length-1].date:null;
  const streak=calcStreak(sorted);
  const scaleCounts={RX:0,Inter:0,SC:0,Adaptado:0};
  sorted.forEach(r=>(r.blocks||[]).forEach(b=>{if(b.scale&&scaleCounts[b.scale]!==undefined)scaleCounts[b.scale]++;}));
  const scaleTotal=Object.values(scaleCounts).reduce((a,b)=>a+b,0);
  const favScale=scaleTotal>0?SCALE_ORDER.find(s=>scaleCounts[s]===Math.max(...Object.values(scaleCounts))):null;
  const energies=sorted.filter(r=>r.energyLevel).map(r=>r.energyLevel);
  const avgEnergy=energies.length?(energies.reduce((a,b)=>a+b,0)/energies.length).toFixed(1):null;
  const rpes=sorted.flatMap(r=>(r.blocks||[]).map(b=>b.rpe).filter(Boolean));
  const avgRpe=rpes.length?(rpes.reduce((a,b)=>a+b,0)/rpes.length).toFixed(1):null;
  const datesWithResult=new Set(sorted.map(r=>r.date));
  const _now=new Date();const _startSun=new Date(_now);_startSun.setDate(_now.getDate()-_now.getDay()-21);
  const calDays=Array.from({length:28},(_,i)=>{const d=new Date(_startSun);d.setDate(_startSun.getDate()+i);return toISO(d);});
  const rxRate=scaleTotal>0?Math.round(scaleCounts.RX/scaleTotal*100):null;

  const milestones=[
    {icon:'🏋️',label:'Primeira sessão',done:total>=1,tag:'10pts'},
    {icon:'📅',label:'10 sessões',done:total>=10,tag:'25pts'},
    {icon:'💪',label:'30 sessões',done:total>=30,tag:'50pts'},
    {icon:'🔥',label:'50 sessões',done:total>=50,tag:'75pts'},
    {icon:'⭐',label:'100 sessões',done:total>=100,tag:'100pts'},
    {icon:'🔥',label:'5 dias seguidos',done:streak>=5,tag:'30pts'},
    {icon:'🔥',label:'10 dias seguidos',done:streak>=10,tag:'60pts'},
    {icon:'⚔️',label:'RX pela primeira vez',done:scaleCounts.RX>0,tag:'20pts'},
  ];

  const recent=sorted.slice(0,8);
  function sessName(r){
    const daySessions=allSessions[r.date]||[];
    const s=daySessions.find(s=>s.id===r.sessionId);
    return s?.sessionName||s?.name||'Treino';
  }

  document.getElementById('root').innerHTML=`
    <header class="hdr" style="position:relative">
      <a class="hdr-back" href="index.html">←</a>
      <div class="hdr-rule"><div class="hdr-line"></div><div class="hdr-diamond"></div><div class="hdr-line r"></div></div>
      <div class="brand">CONE</div><div class="gym">Meu Perfil</div>
    </header>

    <div class="hero">
      <div class="ath-avatar" style="background:${esc(color)}">${esc(initials(athlete.name))}</div>
      <div>
        <div class="hero-name">${esc(athlete.name)}</div>
        <div class="hero-sub">${total} sessõe${total!==1?'s':''} registrada${total!==1?'s':''}</div>
        ${earliest?`<div class="hero-since">desde ${fmtDateLong(earliest)}</div>`:''}
      </div>
      ${streak>0?`<div class="streak-badge">
        <div class="streak-flame">🔥</div>
        <div class="streak-num">${streak}</div>
        <div class="streak-lbl">dias</div>
      </div>`:''}
    </div>

    <div class="stats-row">
      <div class="stat-cell"><div class="stat-num">${total}</div><div class="stat-lbl">Total</div></div>
      <div class="stat-cell"><div class="stat-num">${thisMonth}</div><div class="stat-lbl">Este mês</div></div>
      <div class="stat-cell"><div class="stat-num">${thisWeek}</div><div class="stat-lbl">Esta semana</div></div>
    </div>

    <div class="tabs">
      <button class="tab active" onclick="setTab(0)"><span class="tab-rune">◈</span>Semana</button>
      <button class="tab" onclick="setTab(1)"><span class="tab-rune">◉</span>Escalas</button>
      <button class="tab" onclick="setTab(2)"><span class="tab-rune">◇</span>Missões</button>
      <button class="tab" onclick="setTab(3)"><span class="tab-rune">◎</span>Histórico</button>
    </div>

    <!-- Panel 0: Semana -->
    <div class="panel active">
      <div class="sec-title">Esta semana</div>
      <div class="week-wrap" style="padding-bottom:10px">
        <div class="week-strip">${weekISOs.map((iso,i)=>{
          const done=datesWithResult.has(iso);const isToday=iso===today;const future=iso>today;
          let cls='week-dot';
          if(done)cls+=' done';else if(isToday)cls+=' today-empty';else if(future)cls+=' future';
          return`<div class="week-col"><div class="${cls}">${done?'✓':isToday?'·':''}</div><div class="week-lbl">${WEEK_LABELS[i]}</div></div>`;
        }).join('')}</div>
      </div>
      <div class="sec-title">Últimas 4 semanas</div>
      <div class="heatmap">
        <div class="hm-hdrs">${CAL_HDRS.map(h=>`<div class="hm-hdr">${h}</div>`).join('')}</div>
        <div class="hm-grid">${calDays.map(iso=>`<div class="hm-cell${datesWithResult.has(iso)?' has':''}${iso===today?' today':''}${iso>today?' future':''}"></div>`).join('')}</div>
      </div>
    </div>

    <!-- Panel 1: Escalas -->
    <div class="panel">
      ${scaleTotal>0?`
      <div class="sec-title">Distribuição</div>
      <div class="scale-wrap">
        <div class="hp-cols">${SCALE_ORDER.filter(s=>scaleCounts[s]>0).map(s=>{const pct=Math.round(scaleCounts[s]/scaleTotal*100);const blocks=Array.from({length:10},(_,i)=>{const blockIdx=9-i;const fill=Math.min(100,Math.max(0,(pct-blockIdx*10)/10*100));return`<div class="hp-vblock"><div class="hp-vfill" style="height:${fill}%;background:${SCALE_COLOR[s]}"></div></div>`;}).join('');return`<div class="hp-col"><div class="hp-col-pct">${pct}%</div><div class="hp-col-blocks">${blocks}</div><div class="hp-col-lbl">${s}</div></div>`;}).join('')}</div>
      </div>`:''}
      ${avgEnergy||avgRpe?`<div class="sec-title">Performance</div>
      <div class="stat-pair">
        ${avgEnergy?`<div class="stat-half"><div class="sh-val">${avgEnergy}/5</div><div class="sh-lbl">Energia média</div></div>`:''}
        ${avgRpe?`<div class="stat-half"><div class="sh-val">${avgRpe}/10</div><div class="sh-lbl">RPE médio</div></div>`:''}
      </div>`:''}
      ${rxRate!=null?`<div class="sec-title">% RX</div>
      <div class="stat-pair"><div class="stat-half" style="flex:none;min-width:120px"><div class="sh-val">${rxRate}%</div><div class="sh-lbl">das escalas</div></div></div>`:''}
      ${!scaleTotal&&!avgEnergy&&!avgRpe?`<div class="center-msg" style="padding:40px 0;font-size:12px">Nenhum dado ainda.</div>`:''}
    </div>

    <!-- Panel 2: Missões -->
    <div class="panel">
      <div class="sec-title">Conquistas</div>
      <div class="milestone-list">${milestones.map(m=>`<div class="ms${m.done?' done':''}">
        <div class="ms-icon">${m.icon}</div>
        <div class="ms-name">${m.label}</div>
        <div class="ms-tag">${m.done?'✓ ':''}${m.tag}</div>
      </div>`).join('')}</div>
    </div>

    <!-- Panel 3: Histórico -->
    <div class="panel">
      <div class="sec-title">Recente</div>
      <div class="recent-wrap">${recent.length?recent.map(r=>{
        const wodBlocks=(r.blocks||[]).filter(b=>WOD_TYPES.has(b.blockType));
        return`<div class="rc">
          <div class="rc-top">
            <div class="rc-date">${fmtDateShort(r.date)}</div>
            <div class="rc-sess">${esc(sessName(r))}</div>
          </div>
          ${wodBlocks.length?`<div class="rc-blocks">${wodBlocks.slice(0,2).map(b=>`<div class="rc-blk">
            <div class="rc-type">${esc(b.blockType||'')}</div>
            ${b.blockLabel&&b.blockLabel!==b.blockType?`<span style="font-size:10px;color:var(--sub)">· ${esc(b.blockLabel)}</span>`:''}
            ${b.scale?`<div class="rc-scale" style="color:${SCALE_COLOR[b.scale]||'var(--sub)'};border-color:${SCALE_BORDER[b.scale]||'var(--divider)'}">${esc(b.scale)}</div>`:''}
          </div>`).join('')}</div>`:''}
        </div>`;
      }).join(''):`<div class="center-msg" style="padding:30px 0;font-size:12px">Nenhum resultado ainda.</div>`}</div>
    </div>`;
}

async function main(){
  const id=new URLSearchParams(location.search).get('id');
  try {
    const [athRow,sessRow,resRow]=await Promise.all([
      _sb.from('athletes').select('value').eq('id',1).single(),
      _sb.from('sessions').select('value').eq('id',1).single(),
      id?_sb.from('results').select('value').eq('id',1).single():Promise.resolve({data:null}),
    ]);
    const athletes=athRow.data?.value||[];
    const sessions=sessRow.data?.value||{};
    if(id){
      const athlete=athletes.find(a=>String(a.id)===String(id));
      if(!athlete){renderPicker(athletes);return;}
      const allResults=resRow.data?.value||[];
      const myResults=allResults.filter(r=>String(r.athleteId)===String(id));
      document.title=`${athlete.name} · Cone`;
      renderProfile(athlete,myResults,sessions);
    } else {
      renderPicker(athletes);
    }
  } catch(e) {
    document.getElementById('root').innerHTML='<div class="center-msg" style="padding:40px;color:#806850">Erro ao carregar. Tente novamente.</div>';
  }
}
main();
</script>
