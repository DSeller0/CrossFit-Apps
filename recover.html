<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Cone — Recuperar dados</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<script>!function(){var t=localStorage.getItem('cone_theme')||'totk-dark';document.documentElement.classList.add('theme-'+t)}();</script>
<link rel="stylesheet" href="themes.css"/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Crimson+Pro:ital,wght@0,400;0,600;1,400&family=Amarante&display=swap"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--cream);font-family:var(--font);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.card{background:var(--stone);border:1px solid var(--div);border-radius:12px;padding:28px;max-width:480px;width:100%}
h1{font-size:18px;font-weight:700;color:var(--cream);margin-bottom:4px}
.sub{font-size:13px;color:var(--muted);margin-bottom:20px}
.row{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;background:var(--stone2);border-radius:7px;border:1px solid var(--div);margin-bottom:8px}
.row-label{font-size:12px;color:var(--muted)}
.row-val{font-size:15px;font-weight:700;color:var(--teal)}
.none{color:var(--dim);font-size:15px;font-weight:700}
.btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;margin-top:10px;padding:13px;border-radius:8px;border:none;font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;letter-spacing:.04em;transition:opacity .15s}
.btn:hover{opacity:.88}
.btn-dl{background:var(--teal);color:var(--accent-text,#000)}
.btn-copy{background:var(--stone2);color:var(--sub);border:1px solid var(--div)}
.btn-copy.ok{background:var(--stone2);color:var(--green);border-color:var(--green)}
.warn{font-size:11px;color:var(--gold);margin-top:14px;line-height:1.5;padding:10px;background:var(--stone2);border-radius:6px;border:1px solid var(--div)}
.empty{text-align:center;padding:20px;color:var(--dim);font-size:14px}
</style>
</head>
<body>
<div class="card">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
    <h1 style="margin-bottom:0">Cone — Recuperar dados</h1>
    <a href="index.html" style="color:var(--teal);font-size:13px;text-decoration:none;font-weight:700;letter-spacing:.04em;opacity:.7;transition:opacity .15s" title="Início" onmouseover="this.style.opacity=1" onmouseout="this.style.opacity=.7">← Início</a>
  </div>
  <p class="sub">Lendo localStorage deste navegador...</p>
  <div id="summary"></div>
  <div id="actions"></div>
</div>
<script>
const KEYS = {
  'gym_v9':                  'Sessões de treino',
  'eagles_athletes_v1':      'Atletas',
  'eagles_results_v1':       'Resultados',
  'eagles_events_v1':        'Eventos / agenda',
  'eagles_locations_v1':     'Serviços / locais',
  'eagles_coach_v1':         'Perfil do professor',
  'eagles_settings_v1':      'Configurações',
  'eagles_lb_colors_v1':     'Cores do leaderboard',
  'eagles_block_registry_v1':'Registro de exercícios',
  'eagles_athlete_goals_v1': 'Metas e PRs',
};

function countItems(val, key) {
  try {
    const v = JSON.parse(val);
    if (Array.isArray(v)) return v.length + ' itens';
    if (typeof v === 'object' && v !== null) {
      if (key === 'gym_v9') {
        const days = Object.keys(v).length;
        const sess = Object.values(v).reduce((s,a)=>s+(Array.isArray(a)?a.length:0),0);
        return `${days} dias · ${sess} sessões`;
      }
      return Object.keys(v).length + ' itens';
    }
    return '—';
  } catch { return '—'; }
}

const found = {};
Object.entries(KEYS).forEach(([k]) => {
  const v = localStorage.getItem(k);
  if (v) found[k] = v;
});

const sumEl = document.getElementById('summary');
const actEl = document.getElementById('actions');

if (Object.keys(found).length === 0) {
  sumEl.innerHTML = '<div class="empty">Nenhum dado encontrado neste navegador.<br>Os dados podem ter sido apagados.</div>';
} else {
  sumEl.innerHTML = Object.entries(KEYS).map(([k, label]) => {
    const v = found[k];
    return `<div class="row">
      <span class="row-label">${label}</span>
      <span class="${v ? 'row-val' : 'none'}">${v ? countItems(v, k) : '—'}</span>
    </div>`;
  }).join('');

  const payload = JSON.stringify(
    Object.fromEntries(Object.entries(found).map(([k,v]) => [k, JSON.parse(v)])),
    null, 2
  );
  const blob = new Blob([payload], { type: 'application/json' });
  const url  = URL.createObjectURL(blob);

  actEl.innerHTML = `
    <a class="btn btn-dl" href="${url}" download="cone-backup-${new Date().toISOString().slice(0,10)}.json">
      ⬇ Baixar backup (.json)
    </a>
    <button class="btn btn-copy" id="copy-btn" onclick="copyData()">
      📋 Copiar JSON
    </button>
    <div class="warn">
      Compartilhe o arquivo baixado (ou o JSON copiado) com o administrador para restaurar os dados no Supabase.
    </div>`;

  window._recoverPayload = payload;
}

function copyData() {
  navigator.clipboard.writeText(window._recoverPayload).then(() => {
    const btn = document.getElementById('copy-btn');
    btn.textContent = '✓ Copiado!';
    btn.classList.add('ok');
    setTimeout(() => { btn.textContent = '📋 Copiar JSON'; btn.classList.remove('ok'); }, 2500);
  }).catch(() => {
    // Fallback for browsers that block clipboard without HTTPS interaction
    const ta = document.createElement('textarea');
    ta.value = window._recoverPayload;
    ta.style.position = 'fixed'; ta.style.opacity = '0';
    document.body.appendChild(ta); ta.focus(); ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    const btn = document.getElementById('copy-btn');
    btn.textContent = '✓ Copiado!';
    btn.classList.add('ok');
    setTimeout(() => { btn.textContent = '📋 Copiar JSON'; btn.classList.remove('ok'); }, 2500);
  });
}
</script>
</body>
</html>
