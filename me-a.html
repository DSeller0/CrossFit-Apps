<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Meu Perfil · Cone</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Raleway:wght@400;700;900&display=swap"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#040a18;--panel:#070e20;--panel2:#0a1428;
  --b1:#5850a0;--b2:#c8b840;
  --text:#e0d8b0;--dim:#7878a0;--gold:#c8b840;--teal:#38b0a8;
  --rx:#38b0a8;--inter:#4a80d0;--sc:#c07838;--adp:#8060c0;
  --font:'Raleway',sans-serif;
}
html,body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;padding-bottom:70px}

/* ── Outer wrap ── */
.oot-wrap{max-width:480px;margin:0 auto;min-height:100vh;background:var(--panel);position:relative;border-left:2px solid var(--b1);border-right:2px solid var(--b1)}
.oot-wrap::before{content:'';position:absolute;inset:0;border:2px solid rgba(200,184,64,.18);pointer-events:none;z-index:0}

/* ── Header ── */
.oot-hdr{padding:18px 20px 12px;border-bottom:2px solid var(--b1);text-align:center;position:relative;background:linear-gradient(180deg,#060c22 0%,var(--panel) 100%)}
.oot-brand{font-size:9px;letter-spacing:.5em;color:var(--gold);font-weight:900;text-transform:uppercase;opacity:.7}
.oot-avatar{width:52px;height:52px;border:2px solid var(--b2);display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:900;color:#000;margin:10px auto 8px;position:relative}
.oot-avatar::before,.oot-avatar::after{content:'';position:absolute;width:6px;height:6px}
.oot-avatar::before{top:-2px;left:-2px;border-top:2px solid var(--gold);border-left:2px solid var(--gold)}
.oot-avatar::after{bottom:-2px;right:-2px;border-bottom:2px solid var(--gold);border-right:2px solid var(--gold)}
.oot-name{font-size:18px;font-weight:900;color:var(--text);letter-spacing:.08em;text-transform:uppercase}
.oot-since{font-size:10px;color:var(--dim);letter-spacing:.08em;margin-top:3px}
.hdr-back{position:absolute;top:18px;left:16px;color:var(--dim);font-size:18px;text-decoration:none;transition:color .15s}
.hdr-back:hover{color:var(--gold)}

/* ── Tabs ── */
.oot-tabs{display:flex;border-bottom:2px solid var(--b1);background:var(--panel2)}
.oot-tab{flex:1;padding:8px 2px;background:none;border:none;border-right:1px solid var(--b1);color:var(--dim);cursor:pointer;font-family:var(--font);display:flex;flex-direction:column;align-items:center;gap:2px;font-size:7px;font-weight:900;letter-spacing:.06em;text-transform:uppercase;transition:all .12s;-webkit-tap-highlight-color:transparent}
.oot-tab:last-child{border-right:none}
.oot-tab.active{color:var(--gold);background:rgba(200,184,64,.08);border-bottom:2px solid var(--gold);margin-bottom:-2px}
.tab-ic{font-size:20px;line-height:1}

/* ── Panels ── */
.oot-panel{display:none;padding:18px 16px;animation:ootIn .15s ease}
.oot-panel.active{display:block}
@keyframes ootIn{from{opacity:0;transform:translateX(10px)}to{opacity:1;transform:none}}
.panel-title{font-size:8px;font-weight:900;color:var(--gold);letter-spacing:.25em;text-transform:uppercase;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.panel-title::before,.panel-title::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,transparent,rgba(200,184,64,.3))}
.panel-title::after{background:linear-gradient(270deg,transparent,rgba(200,184,64,.3))}

/* ── Stat grid ── */
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:12px}
.stat-box{background:rgba(0,0,0,.5);border:1px solid var(--b1);padding:14px 8px;text-align:center;position:relative}
.stat-box::before{content:'';position:absolute;top:-1px;left:-1px;width:5px;height:5px;border-top:1px solid var(--b2);border-left:1px solid var(--b2)}
.stat-box::after{content:'';position:absolute;bottom:-1px;right:-1px;width:5px;height:5px;border-bottom:1px solid var(--b2);border-right:1px solid var(--b2)}
.stat-box.wide{grid-column:1/-1}
.stat-n{font-size:36px;font-weight:900;color:var(--gold);line-height:1}
.stat-n.med{font-size:22px}
.stat-lbl{font-size:8px;color:var(--dim);text-transform:uppercase;letter-spacing:.12em;margin-top:5px}

/* ── Calendar ── */
.cal-header{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:4px}
.cal-hdcell{font-size:8px;color:var(--dim);text-align:center;font-weight:700;letter-spacing:.04em;padding:2px 0}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.cal-cell{aspect-ratio:1;background:rgba(0,0,0,.4);border:1px solid rgba(88,80,160,.25);display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:var(--dim)}
.cal-cell.has{background:rgba(56,176,168,.15);border-color:var(--teal);color:var(--teal)}
.cal-cell.today{border-color:var(--gold);color:var(--gold)}
.cal-cell.future{opacity:.2}

/* ── Week slots ── */
.week-slots{display:flex;gap:4px;margin-top:14px}
.week-slot{flex:1;text-align:center}
.ws-pip{font-size:16px;color:var(--dim);line-height:1}
.ws-pip.filled{color:var(--gold)}
.ws-lbl{font-size:8px;color:var(--dim);font-weight:700;letter-spacing:.04em;margin-top:3px}

/* ── Quests ── */
.quest-list{display:flex;flex-direction:column;gap:5px}
.quest{background:rgba(0,0,0,.35);border:1px solid rgba(88,80,160,.4);padding:10px 12px;display:flex;align-items:center;gap:10px;transition:border-color .1s}
.quest.done{border-color:rgba(200,184,64,.5)}
.quest-check{width:14px;height:14px;border:1px solid var(--dim);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:900}
.quest.done .quest-check{border-color:var(--gold);color:var(--gold)}
.quest-name{font-size:11px;font-weight:700;color:var(--dim);flex:1}
.quest.done .quest-name{color:var(--text)}
.quest-reward{font-size:9px;color:var(--dim);white-space:nowrap}
.quest.done .quest-reward{color:rgba(200,184,64,.7)}

/* ── Status bars ── */
.status-row{margin-bottom:10px}
.status-top{display:flex;justify-content:space-between;font-size:9px;font-weight:700;color:var(--dim);text-transform:uppercase;letter-spacing:.08em;margin-bottom:5px}
.status-top span{color:var(--gold)}
.status-track{height:7px;background:rgba(0,0,0,.5);border:1px solid rgba(88,80,160,.4)}
.status-fill{height:100%;background:linear-gradient(90deg,var(--teal),var(--gold));transition:width .3s}
.scale-rows{display:flex;flex-direction:column;gap:5px;margin-top:12px}
.sc-row{display:flex;align-items:center;gap:8px}
.sc-name{font-size:10px;font-weight:700;color:var(--dim);width:58px;letter-spacing:.04em}
.sc-track{flex:1;height:6px;background:rgba(0,0,0,.5);border:1px solid rgba(88,80,160,.3)}
.sc-fill{height:100%}
.sc-pct{font-size:9px;color:var(--gold);width:28px;text-align:right;font-weight:700}

/* ── Picker ── */
.picker-wrap{max-width:420px;margin:0 auto;padding:28px 20px}
.picker-title{font-size:11px;font-weight:900;letter-spacing:.25em;color:var(--gold);text-transform:uppercase;margin-bottom:4px;text-align:center}
.picker-sub{font-size:12px;color:var(--dim);margin-bottom:20px;text-align:center}
.picker-input{width:100%;background:rgba(0,0,0,.5);border:1px solid var(--b1);color:var(--text);font-family:var(--font);font-size:14px;padding:11px 14px;outline:none;transition:border-color .15s}
.picker-input:focus{border-color:var(--gold)}
.picker-list{margin-top:8px;display:flex;flex-direction:column;gap:4px}
.picker-item{background:rgba(0,0,0,.4);border:1px solid var(--b1);padding:12px 14px;cursor:pointer;display:flex;align-items:center;gap:10px;text-decoration:none;transition:border-color .12s;position:relative}
.picker-item::before{content:'▶';position:absolute;right:12px;font-size:9px;color:var(--dim)}
.picker-item:hover{border-color:var(--gold)}
.ath-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.picker-name{font-size:14px;font-weight:700;color:var(--text)}
.picker-empty{text-align:center;padding:24px 0;font-size:12px;color:var(--dim)}

/* ── Bottom nav ── */
.p-nav{position:fixed;bottom:0;left:0;right:0;background:#020810;border-top:2px solid var(--b1);display:flex;padding-bottom:env(safe-area-inset-bottom,0);z-index:30}
.p-nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px 4px;gap:3px;color:var(--dim);text-decoration:none;font-family:var(--font);font-size:8px;font-weight:900;letter-spacing:.08em;border:none;background:none;cursor:pointer;transition:color .15s;text-transform:uppercase}
.p-nav-btn.active{color:var(--gold)}
.p-nav-ic{font-size:17px;line-height:1}
.p-nav-sep{width:1px;background:var(--b1);margin:8px 0}
.center-msg{text-align:center;padding:60px 20px;color:var(--dim);font-size:13px;line-height:1.8}
</style>
</head>

function toISO(d){return [d.getFullYear(),String(d.getMonth()+1).padStart(2,'0'),String(d.getDate()).padStart(2,'0')].join('-')}
function todayISO(){return toISO(new Date())}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function fmtDateLong(iso){return new Date(iso+'T12:00:00').toLocaleDateString('pt-BR',{month:'long',year:'numeric'})}
function initials(name){return name.trim().split(/\s+/).map(w=>w[0]).slice(0,2).join('').toUpperCase()}

function isoWeekDates(){
  const today=new Date(),dow=today.getDay(),daysFromMon=dow===0?6:dow-1;
  const mon=new Date(today);mon.setDate(today.getDate()-daysFromMon);
  return Array.from({length:7},(_,i)=>{const d=new Date(mon);d.setDate(mon.getDate()+i);return toISO(d)});
}

function calcStreak(sorted){
  if(!sorted.length)return 0;
  const dates=[...new Set(sorted.map(r=>r.date))].sort().reverse();
  const today=todayISO(),yesterday=toISO(new Date(Date.now()-86400000));
  if(dates[0]!==today&&dates[0]!==yesterday)return 0;
  let streak=0,expected=dates[0];
  for(const d of dates){
    if(d===expected){streak++;const p=new Date(expected+'T12:00:00');p.setDate(p.getDate()-1);expected=toISO(p);}
    else break;
  }
  return streak;
}

let currentTab=0;
function setTab(i){
  document.querySelectorAll('.oot-tab').forEach((t,j)=>t.classList.toggle('active',j===i));

  currentTab=i;
}

function renderProfile(athlete,myResults,allSessions){
  const root=document.getElementById('root');
  const today=todayISO();
  const color=athlete.color||'#38b0a8';
  const sorted=[...myResults].sort((a,b)=>b.date.localeCompare(a.date));
  const total=sorted.length;
  const nowY=new Date().getFullYear(),nowM=new Date().getMonth()+1;
  const thisMonth=sorted.filter(r=>{const[y,m]=r.date.split('-').map(Number);return y===nowY&&m===nowM}).length;
  const weekDates=new Set(isoWeekDates());
  const thisWeek=sorted.filter(r=>weekDates.has(r.date)).length;
  const earliest=sorted.length?sorted[sorted.length-1].date:null;
  const streak=calcStreak(sorted);
  const scaleCounts={RX:0,Inter:0,SC:0,Adaptado:0};
  sorted.forEach(r=>(r.blocks||[]).forEach(b=>{if(b.scale&&scaleCounts[b.scale]!==undefined)scaleCounts[b.scale]++;}));
  const scaleTotal=Object.values(scaleCounts).reduce((a,b)=>a+b,0);
  const favScale=scaleTotal>0?SCALE_ORDER.find(s=>scaleCounts[s]===Math.max(...Object.values(scaleCounts))):null;
  const energies=sorted.filter(r=>r.energyLevel).map(r=>r.energyLevel);
  const avgEnergy=energies.length?(energies.reduce((a,b)=>a+b,0)/energies.length).toFixed(1):null;
  const rpes=sorted.flatMap(r=>(r.blocks||[]).map(b=>b.rpe).filter(Boolean));
  const avgRpe=rpes.length?(rpes.reduce((a,b)=>a+b,0)/rpes.length).toFixed(1):null;
  const datesWithResult=new Set(sorted.map(r=>r.date));
  const weekISOs=isoWeekDates();

    {label:'100 sessões',test:total>=100,reward:'◆×5'},
    {label:'5 dias seguidos',test:streak>=5,reward:'🔥'},

  root.innerHTML=`<div class="oot-wrap">

      <div class="oot-brand">— Cone —</div>
      <div class="oot-avatar" style="background:${esc(color)}">${esc(initials(athlete.name))}</div>
      <div class="oot-name">${esc(athlete.name)}</div>
      ${earliest?`<div class="oot-since">desde ${fmtDateLong(earliest)}</div>`:''}
    </div>

    <div class="oot-tabs">
      <button class="oot-tab active" onclick="setTab(0)"><span class="tab-ic">⚔️</span>Itens</button>
      <button class="oot-tab" onclick="setTab(1)"><span class="tab-ic">🗺️</span>Mapa</button>
      <button class="oot-tab" onclick="setTab(2)"><span class="tab-ic">📜</span>Missões</button>
      <button class="oot-tab" onclick="setTab(3)"><span class="tab-ic">⚙️</span>Status</button>
    </div>

    <!-- Panel 0: ITENS -->
    <div class="oot-panel active">
      <div class="panel-title">Estatísticas</div>
      <div class="stat-grid">
        <div class="stat-box"><div class="stat-n">${total}</div><div class="stat-lbl">Total</div></div>
        <div class="stat-box"><div class="stat-n">${thisMonth}</div><div class="stat-lbl">Este mês</div></div>
        <div class="stat-box"><div class="stat-n">${thisWeek}</div><div class="stat-lbl">Esta semana</div></div>
        <div class="stat-box"><div class="stat-n">${streak}</div><div class="stat-lbl">Sequência</div></div>
        ${favScale?`<div class="stat-box wide"><div class="stat-n med" style="color:${SCALE_COLOR[favScale]||'var(--gold)'}">${favScale}</div><div class="stat-lbl">Escala favorita</div></div>`:''}
      </div>
    </div>

    <!-- Panel 1: MAPA -->
    <div class="oot-panel">
      <div class="panel-title">Presença — 4 semanas</div>
      <div class="cal-header">${CAL_HDRS.map(h=>`<div class="cal-hdcell">${h}</div>`).join('')}</div>

      <div class="panel-title" style="margin-top:18px">Esta semana</div>
      <div class="week-slots">${weekISOs.map((iso,i)=>{const done=datesWithResult.has(iso);const isToday=iso===today;const fut=iso>today;return`<div class="week-slot"><div class="ws-pip${done?' filled':''}" style="${isToday&&!done?'color:var(--b2)':''}">${done?'◆':isToday?'◈':'◇'}</div><div class="ws-lbl">${WEEK_LABELS[i]}</div></div>`;}).join('')}</div>
    </div>

    <!-- Panel 2: MISSÕES -->
    <div class="oot-panel">
      <div class="panel-title">Missões</div>
      <div class="quest-list">${milestones.map(m=>`<div class="quest${m.test?' done':''}">

      ${scaleTotal>0?`<div class="panel-title" style="margin-top:14px">Escalas usadas</div>
      <div class="scale-rows">${SCALE_ORDER.filter(s=>scaleCounts[s]>0).map(s=>{const pct=Math.round(scaleCounts[s]/scaleTotal*100);return`<div class="sc-row"><div class="sc-name">${s}</div><div class="sc-track"><div class="sc-fill" style="width:${pct}%;background:${SCALE_COLOR[s]}"></div></div><div class="sc-pct">${pct}%</div></div>`;}).join('')}</div>`:''}
      ${!avgEnergy&&!avgRpe&&!scaleTotal?`<div style="text-align:center;padding:40px 0;font-size:12px;color:var(--dim)">Nenhum dado de status ainda.</div>`:''}
